<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="茫茫股海" />
<meta name="theme-color" content="#EFE7D6" />
<title>茫茫股海 — 個股分析</title>
<style>
  :root{
    --paper:#EFE7D6; --paperDeep:#E6DBC6; --paperEdge:#DCCFB4;
    --rule:#C9B894; --ruleSoft:#D8CAAC;
    --coffee:#4A3826; --coffeeMid:#6F5A41; --taupe:#8A7458; --faint:#AD9B7C;
    --red:#A8392B; --green:#4F6B47; --gold:#9C6B2E;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--coffee);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
  .serif{font-family:"Songti TC","Noto Serif TC",Georgia,"PingFang TC",serif;}
  .wrap{max-width:540px;margin:0 auto;min-height:100vh;background:var(--paper);
    box-shadow:0 0 0 1px var(--paperEdge);}
  header{position:sticky;top:0;z-index:10;background:var(--paper);
    border-bottom:2px solid var(--coffee);
    padding:max(18px,env(safe-area-inset-top)) 22px 14px;}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .seal{width:42px;height:42px;display:flex;align-items:center;justify-content:center;
    border:1.5px solid var(--red);color:var(--red);font-size:19px;border-radius:5px;
    transform:rotate(-3deg);background:var(--paperDeep);}
  .brand h1{font-size:19px;letter-spacing:.05em;margin:0;color:var(--coffee);}
  .brand p{font-size:11.5px;color:var(--taupe);margin:2px 0 0;}
  .upd{font-size:10.5px;color:var(--gold);margin-left:auto;animation:pulse 1.3s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
  form.search{display:flex;gap:8px;margin-bottom:12px;}
  .acwrap{flex:1;position:relative;}
  .ibox{display:flex;align-items:center;gap:8px;padding:0 12px;
    border:1px solid var(--rule);border-radius:5px;background:var(--paperDeep);}
  .ibox input{flex:1;padding:10px 0;font-size:15px;border:0;outline:none;background:transparent;
    color:var(--coffee);}
  .ibox input::placeholder{color:var(--faint);}
  .aclist{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:30;margin:0;padding:4px;
    list-style:none;background:var(--paper);border:1px solid var(--rule);border-radius:6px;
    box-shadow:0 8px 24px rgba(74,56,38,.18);max-height:280px;overflow-y:auto;display:none;}
  .aclist.show{display:block;}
  .aclist li{display:flex;align-items:baseline;gap:8px;padding:9px 10px;border-radius:4px;cursor:pointer;}
  .aclist li:active,.aclist li.hl{background:var(--paperDeep);}
  .aclist .acn{font-size:14px;color:var(--coffee);}
  .aclist .acc{font-size:12px;color:var(--taupe);font-family:ui-monospace,monospace;margin-left:auto;}
  .aclist .achdr{font-size:11px;color:var(--taupe);padding:7px 10px 3px;letter-spacing:.05em;cursor:default;}
  .aclist .achdr.hl,.aclist .achdr:active{background:transparent;}
  .idxband{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;
    padding:12px 22px;background:var(--paperDeep);border-bottom:1px solid var(--rule);}
  .idxband::-webkit-scrollbar{display:none;}
  .idxtile{flex:0 0 auto;min-width:118px;padding:8px 12px;border:1px solid var(--rule);
    border-radius:7px;background:var(--paper);}
  .idxtile .il{font-size:11px;color:var(--taupe);}
  .idxtile .iv{font-size:17px;line-height:1.2;margin-top:3px;font-family:ui-monospace,monospace;}
  .idxtile .ic{font-size:11px;margin-top:2px;font-family:ui-monospace,monospace;}
  .idxnote{font-size:10.5px;color:var(--faint);padding:0 22px 10px;background:var(--paperDeep);border-bottom:1px solid var(--rule);}
  .btn{padding:0 20px;font-size:14px;font-weight:500;border:0;border-radius:5px;
    background:var(--coffee);color:var(--paper);}
  .watchrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .pfhead-totals{display:flex;flex-direction:column;gap:3px;margin-top:8px;}
  .pfh-item{font-size:12px;color:var(--coffeeMid);display:flex;align-items:center;gap:6px;}
  .pfh-item .pfh-lbl{color:var(--taupe);font-size:11px;min-width:84px;}
  .pfh-item b{font-weight:700;}
  .wbtn{display:inline-flex;align-items:center;gap:6px;font-size:13.5px;color:var(--coffeeMid);
    border:1px solid var(--rule);background:var(--paperDeep);border-radius:6px;padding:9px 20px;}
  .wbtn.on{background:var(--coffee);color:var(--paper);border-color:var(--coffee);}
  .wbtn:disabled,.wbtn.disabled{color:var(--faint);background:var(--paperDeep);border-color:var(--ruleSoft);opacity:.55;cursor:not-allowed;}
  .watchpanel{display:none;}
  .watchpanel.show{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
  .wp-head{display:flex;align-items:center;justify-content:space-between;}
  .wp-head .t{font-size:12px;color:var(--taupe);}
  .wp-edit{font-size:12px;color:var(--coffeeMid);border:1px solid var(--rule);background:transparent;
    border-radius:999px;padding:4px 12px;}
  .wp-edit.on{color:var(--red);border-color:var(--red);}
  .wp-list{display:flex;flex-wrap:wrap;gap:8px;}
  .chips{flex:1;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{white-space:nowrap;display:inline-flex;align-items:center;flex-shrink:0;
    border:1px solid var(--rule);border-radius:999px;font-size:12px;color:var(--coffeeMid);
    overflow:hidden;}
  .chip.active{background:var(--coffee);color:var(--paper);border-color:var(--coffee);}
  .chip .lbl{padding:5px 12px;}
  .chip .rm{padding:5px 8px 5px 0;color:inherit;opacity:.85;}
  .editbtn{font-size:11.5px;color:var(--taupe);padding:4px 6px;flex-shrink:0;background:none;border:0;}
  .editbtn.on{color:var(--red);}
  .empty{font-size:11.5px;color:var(--faint);padding:4px 0;}
  .chiptbl{font-size:12px;}
  .chiptbl .chr{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;padding:6px 0;border-bottom:1px solid var(--ruleSoft);align-items:center;}
  .chiptbl .chr.chh{color:var(--taupe);font-size:11px;border-bottom:1px solid var(--rule);}
  .chiptbl .chd{color:var(--coffeeMid);}
  .chiptbl .chv{text-align:right;}
  .holdgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .holdgrid .holdcell{border:1px solid var(--rule);border-radius:8px;padding:12px 8px;text-align:center;background:var(--paper);}
  .holdgrid .hl{font-size:12px;color:var(--coffeeMid);}
  .holdgrid .hv{font-size:20px;color:var(--coffee);margin:4px 0 2px;}
  .holdgrid .hs{font-size:10px;color:var(--taupe);}

  .usercount{font-size:11.5px;color:var(--taupe);text-align:right;padding:6px 4px 0;letter-spacing:.02em;}
  .usercount #ucnum{color:var(--gold);font-weight:600;}
  .portfoliopanel{display:none;}
  .portfoliopanel.show{display:block;margin-top:10px;}
  .pf-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .pf-head .t{font-size:12px;color:var(--taupe);}
  .pf-head .pf-refresh{font-size:11.5px;color:var(--coffeeMid);background:none;border:1px solid var(--rule);border-radius:6px;padding:3px 8px;}
  .pf-input{display:grid;grid-template-columns:1.4fr 1fr 1fr auto;gap:6px;margin-bottom:10px;}
  .pf-input input{font-size:13px;padding:8px;border:1px solid var(--rule);border-radius:6px;background:var(--paper);color:var(--coffee);width:100%;box-sizing:border-box;min-width:0;}
  .pf-acwrap{position:relative;min-width:0;}
  .pf-input .pf-add{font-size:13px;padding:8px 12px;border-radius:6px;border:1px solid var(--coffee);background:var(--coffee);color:var(--paper);white-space:nowrap;}
  .pf-sum{display:flex;flex-wrap:wrap;gap:14px;padding:10px 12px;border:1px solid var(--rule);border-radius:8px;background:var(--paperDeep);margin-bottom:10px;font-size:13px;}
  .pf-sum .lbl{color:var(--taupe);font-size:11.5px;}
  .pf-sum b{font-weight:700;}
  .pf-list{display:flex;flex-direction:column;gap:8px;}
  .pf-row{display:grid;grid-template-columns:1fr auto;gap:4px 8px;padding:10px 12px;border:1px solid var(--rule);border-radius:8px;background:var(--paper);}
  .pf-row .pf-name{font-size:13.5px;color:var(--coffee);font-weight:600;text-align:left;background:none;border:0;padding:0;}
  .pf-row .pf-meta{font-size:11px;color:var(--taupe);grid-column:1/2;}
  .pf-row .pf-pl{grid-column:1/3;display:flex;flex-wrap:wrap;gap:16px;font-size:12.5px;margin-top:4px;}
  .pf-row .pf-pl .k{color:var(--taupe);font-size:11px;margin-right:3px;}
  .pf-row .pf-del{grid-row:1/2;grid-column:2/3;color:var(--taupe);background:none;border:0;font-size:14px;padding:0 2px;}
  .pf-empty{font-size:12px;color:var(--faint);padding:6px 2px;}
  .pf-pager{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:10px;}
  .pf-pg{font-size:12.5px;color:var(--coffeeMid);background:none;border:1px solid var(--rule);border-radius:6px;padding:6px 10px;}
  .pf-pg:disabled{opacity:.4;}
  .pf-pgnum{font-size:11.5px;color:var(--taupe);}

  .stockhead{padding:22px 22px 12px;background:var(--paperDeep);}
  .syncbtn{width:100%;margin-top:12px;padding:11px;border-radius:8px;border:1px solid var(--coffee);
    background:var(--coffee);color:var(--paper);font-size:14px;display:flex;align-items:center;
    justify-content:center;gap:8px;}
  .syncbtn.busy{opacity:.75;}
  .syncbtn .spin{width:14px;height:14px;border-radius:50%;border:2px solid rgba(239,231,214,.4);
    border-top-color:var(--paper);display:inline-block;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .syncnote{margin-top:8px;font-size:12px;line-height:1.6;}
  .syncnote.ok{color:var(--green);}
  .syncnote.err{color:var(--red);}
  .stockhead .top{display:flex;align-items:baseline;justify-content:space-between;}
  .stockhead .nm{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
  .stockhead .nm h2{font-size:23px;margin:0;color:var(--coffee);}
  .stockhead .code{font-size:14px;color:var(--taupe);}
  .tag{font-size:11px;padding:1px 6px;border:1px solid var(--rule);color:var(--taupe);border-radius:3px;}
  .ind{font-size:11.5px;color:var(--taupe);margin-top:4px;}
  .price{text-align:right;}
  .price .num{display:flex;align-items:baseline;justify-content:flex-end;gap:3px;}
  .price .cur{font-size:13px;opacity:.75;}
  .price .big{font-size:28px;line-height:1;}
  .price .chg{font-size:12px;margin-top:4px;}
  .srcline{margin-top:12px;display:flex;align-items:center;justify-content:space-between;}
  .src{display:inline-flex;align-items:center;gap:6px;font-size:11px;letter-spacing:.03em;}
  .dot{width:5px;height:5px;border-radius:50%;display:inline-block;}
  .addbtn{font-size:11.5px;padding:3px 10px;border-radius:999px;border:1px solid var(--coffee);
    color:var(--coffee);background:transparent;display:inline-flex;align-items:center;gap:4px;}
  .addbtn.in{border-color:var(--green);color:var(--green);}

  section.sec{padding:26px 22px;border-top:1px solid var(--rule);}
  .acc-tools{display:flex;justify-content:flex-end;gap:8px;padding:12px 22px 2px;}
  .acc-toolbtn{font-size:12px;color:var(--coffeeMid);border:1px solid var(--rule);
    background:transparent;border-radius:999px;padding:6px 14px;}
  .acc-item{border-top:1px solid var(--rule);}
  .acc-head{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:16px 22px;background:transparent;border:0;text-align:left;cursor:pointer;}
  .acc-head:active{background:rgba(220,207,180,.25);}
  .acc-title{font-size:18px;color:var(--coffee);display:flex;align-items:baseline;gap:10px;letter-spacing:.02em;}
  .acc-title .ord{font-size:12px;font-weight:600;color:var(--gold);}
  .acc-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .chev{font-size:13px;color:var(--taupe);transition:transform .2s ease;display:inline-block;}
  .acc-head.open .chev{transform:rotate(180deg);}
  .acc-body{padding:2px 22px 26px;}
  .sec h3{display:flex;align-items:baseline;gap:10px;font-size:19px;margin:0 0 16px;
    letter-spacing:.02em;color:var(--coffee);}
  .sec h3 .ord{font-size:12px;font-weight:600;color:var(--gold);}
  .sec .head{display:flex;align-items:baseline;justify-content:space-between;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  .grid2x2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .tgtlist{display:flex;flex-direction:column;}
  .tgtcalc{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .tgtcalc .tc{border:1px solid var(--rule);border-radius:6px;padding:12px;text-align:center;background:var(--paperDeep);}
  .tgtcalc .tcl{font-size:12px;color:var(--taupe);margin-bottom:6px;}
  .tgtcalc .tcv{font-size:22px;font-family:"Songti TC","Noto Serif TC",Georgia,serif;}
  .tgtcalc .tcp{font-size:12px;margin-top:2px;font-family:ui-monospace,monospace;}
  .mgtbl{display:flex;flex-direction:column;}
  .mgth{display:flex;align-items:center;padding:6px 0;border-bottom:1px solid var(--rule);font-size:11px;color:var(--taupe);}
  .mgr{display:flex;align-items:center;padding:9px 0;border-bottom:1px dotted var(--ruleSoft);}
  .mgr .mgd,.mgth .mgd{width:54px;flex-shrink:0;font-size:12px;color:var(--taupe);font-family:ui-monospace,monospace;}
  .mgr .mgv,.mgth .mgv{flex:1;text-align:right;font-size:14px;padding-right:8px;}
  .mgth .mgv{font-size:11px;}
  .tgr{display:flex;align-items:baseline;gap:10px;padding:9px 0;border-bottom:1px dotted var(--ruleSoft);}
  .tgr .tgd{font-size:12px;color:var(--taupe);width:46px;flex-shrink:0;font-family:ui-monospace,monospace;}
  .tgr .tgf{font-size:14px;color:var(--coffee);flex:1;}
  .tgr .tgp{font-size:15px;color:var(--gold);font-weight:600;}
  .gridm{display:grid;grid-template-columns:1fr 1fr;gap:20px 16px;}
  .stat .v{font-size:20px;line-height:1.2;}
  .stat .l{font-size:11.5px;margin-top:4px;color:var(--taupe);}
  .note{font-size:11px;margin-top:8px;color:var(--faint);}
  .msg{font-size:14px;color:var(--taupe);}
  .legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:6px;}
  .legend span{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--taupe);}
  .legend i{width:12px;height:2px;display:inline-block;}
  .catrow{display:flex;margin-top:4px;}
  .catrow span{flex:1;text-align:center;font-size:11px;color:var(--taupe);}
  .ryhd{font-size:12px;color:var(--taupe);margin-bottom:8px;}
  .revyear{display:grid;grid-template-columns:1fr 1fr;gap:6px 18px;}
  .ry{display:flex;align-items:baseline;gap:8px;padding:6px 0;border-bottom:1px dotted var(--ruleSoft);}
  .ry .rym{font-size:12.5px;color:var(--coffeeMid);width:34px;flex-shrink:0;}
  .ry .ryv{font-size:14px;color:var(--coffee);margin-left:auto;}
  .rytag{font-size:9.5px;padding:1px 5px;border-radius:3px;flex-shrink:0;
    color:var(--gold);border:1px solid var(--gold);}
  .rytag.est{color:var(--faint);border-color:var(--faint);}
  .instdays{display:grid;grid-template-columns:1fr 1fr;gap:6px 18px;}
  .idr{display:flex;align-items:baseline;gap:8px;padding:6px 0;border-bottom:1px dotted var(--ruleSoft);}
  .idr .idd{font-size:12.5px;color:var(--coffeeMid);width:48px;flex-shrink:0;}
  .idr .idv{font-size:14px;margin-left:auto;}
  .hilo{font-size:11px;color:var(--faint);margin-top:6px;text-align:right;}
  .pattern{margin-top:14px;padding:12px 14px;border:1px solid var(--rule);border-left-width:3px;border-radius:4px;background:var(--paperDeep);}
  .pattern .pl{font-size:17px;font-family:"Songti TC","Noto Serif TC",Georgia,serif;}
  .pattern .pl .plk{font-size:14px;color:var(--taupe);font-family:-apple-system,sans-serif;}
  .pattern .pd{font-size:12px;color:var(--coffeeMid);margin-top:5px;line-height:1.6;}
  .kbarwrap{position:relative;display:flex;border:1px solid var(--ruleSoft);border-radius:4px;
    background:rgba(220,207,180,.18);overflow:hidden;}
  .kbarsec{padding:14px 22px 18px;border-bottom:1px solid var(--rule);background:var(--paper);}
  .kbarsec .legend{margin-bottom:10px;}
  .kbar-yaxis{flex-shrink:0;width:46px;border-right:1px solid var(--ruleSoft);}
  .kbar{flex:1;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .kbar::-webkit-scrollbar{display:none;}
  .kbar svg{min-width:100%;}
  .zoom{position:absolute;bottom:8px;left:54px;display:flex;gap:6px;z-index:2;}
  .zbtn{width:32px;height:32px;border-radius:8px;border:1px solid var(--rule);
    background:rgba(239,231,214,.92);color:var(--coffee);font-size:18px;line-height:1;
    display:flex;align-items:center;justify-content:center;}
  .zbtn:disabled{opacity:.35;}

  .meter{display:flex;gap:4px;height:7px;}
  .meter i{border-radius:1px;}
  .sigrow{display:flex;align-items:flex-start;gap:12px;padding:9px 0;border-bottom:1px dotted var(--ruleSoft);}
  .sigrow .sym{width:16px;flex-shrink:0;font-size:13px;}
  .sigrow .lab{font-size:14px;color:var(--coffee);}
  .sigrow .w{font-size:10px;color:var(--gold);margin-left:6px;}
  .sigrow .sn{font-size:11.5px;margin-top:3px;color:var(--taupe);}
  .verdict{margin-top:20px;font-size:18px;}
  .concl{border:1px solid var(--rule);border-left-width:4px;border-radius:5px;padding:14px;background:var(--paperDeep);}
  .cl-grade{font-size:20px;font-family:"Songti TC","Noto Serif TC",Georgia,serif;}
  .cl-score{font-size:13px;color:var(--taupe);font-family:ui-monospace,monospace;}
  .cl-strat{font-size:13.5px;color:var(--coffee);margin-top:8px;}
  .cl-text{font-size:12.5px;color:var(--coffeeMid);margin-top:6px;line-height:1.7;}
  .regime{display:flex;justify-content:space-between;gap:10px;font-size:12px;color:var(--coffeeMid);
    margin-top:12px;padding:8px 10px;border:1px dashed var(--rule);border-radius:5px;}
  .killbox{margin-top:12px;padding:10px 12px;border-radius:5px;font-size:13px;
    background:rgba(168,57,43,.10);color:var(--red);border:1px solid var(--red);}
  .ipobox{margin-top:12px;padding:10px 12px;border-radius:5px;font-size:12.5px;
    background:rgba(156,107,46,.10);color:var(--gold);border:1px solid var(--gold);}
  .blind{margin-top:4px;}
  .bl{display:flex;gap:8px;align-items:flex-start;padding:7px 0;border-bottom:1px dotted var(--ruleSoft);font-size:12.5px;color:var(--coffeeMid);line-height:1.6;}
  .bl .blx{flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--red);color:#fff;
    font-size:11px;text-align:center;line-height:16px;margin-top:1px;}
  .vpattern{margin-top:6px;font-size:16px;}
  .vpattern .plk{font-size:13px;color:var(--taupe);}
  .disc{margin-top:16px;padding:12px;border:1px solid var(--rule);border-radius:3px;background:var(--paperDeep);}
  .disc p{font-size:11px;line-height:1.7;color:var(--coffeeMid);margin:0;}
  footer{padding:24px 22px max(24px,env(safe-area-inset-bottom));font-size:11px;line-height:1.7;
    color:var(--faint);border-top:2px solid var(--coffee);}
  .center{text-align:center;padding:64px 22px;}
  .center .t{font-size:17px;color:var(--coffee);}
  .center .d{font-size:12px;margin-top:12px;line-height:1.7;color:var(--taupe);}
</style>
</head>
<body>
<div class="wrap">
  <div class="usercount" id="usercount">目前使用軟體人數：<span id="ucnum">—</span></div>
  <header>
    <div class="brand">
      <div class="seal serif">茫</div>
      <div>

      if(name===q) rank=0; else if(name.indexOf(q)===0) rank=2; else if(name.indexOf(q)>=0) rank=3;
    }
    if(rank>=0) res.push({code:it.code,name:it.name,rank:rank});
  }

function toNum(v){
  if(v===null||v===undefined) return null;
  if(typeof v==="number") return isNaN(v)?null:v;
  var s=String(v).replace(/,/g,"").replace(/%/g,"").trim();
  if(s===""||s==="--"||s==="N/A"||s==="-") return null;
  var n=parseFloat(s); return isNaN(n)?null:n;
}
function field(row,cands){
  if(!row) return null;
  for(var i=0;i<cands.length;i++){var c=cands[i]; if(row[c]!==undefined&&row[c]!==null&&row[c]!=="") return row[c];}
  var keys=Object.keys(row);
  for(var j=0;j<cands.length;j++){
    for(var k=0;k<keys.length;k++){ if(keys[k].indexOf(cands[j])>=0 && row[keys[k]]!=="" && row[keys[k]]!=null) return row[keys[k]]; }
  }
  return null;
}
function findByCode(arr,code,cands){
  if(!Array.isArray(arr)) return null;
  for(var i=0;i<arr.length;i++){var v=field(arr[i],cands); if(v!=null && String(v).trim().toUpperCase()===code.toUpperCase()) return arr[i];}

}

function fetchVia(url,timeout){
  timeout=timeout||9000;
  var attempt=function(i){
    if(i>=PROXIES.length) return Promise.reject(new Error("all proxies failed"));
    var pUrl=PROXIES[i](url);
    var to=(pUrl.indexOf(PROXY_BASE+"/fetch")===0)?4500:timeout; // 本機代理逾時短一點，掛了就快速回退公開代理
    var ctrl=new AbortController(); var timer=setTimeout(function(){ctrl.abort();},to);
    return fetch(pUrl,{signal:ctrl.signal}).then(function(r){
      clearTimeout(timer); if(!r.ok) throw new Error("HTTP "+r.status); return r.text();
    }).then(function(t){
      try{ return JSON.parse(t); }catch(e){ throw new Error("bad json"); }
    }).catch(function(){ clearTimeout(timer); return attempt(i+1); });
  };
  return attempt(0);
}
// FinMind 等支援跨網域的 API：先直連（較快），失敗再走代理
function fetchDirect(url,timeout){
  timeout=timeout||9000;
  var ctrl=new AbortController(),timer=setTimeout(function(){ctrl.abort();},timeout);
  return fetch(url,{signal:ctrl.signal}).then(function(r){clearTimeout(timer);if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
    .catch(function(e){clearTimeout(timer);throw e;});
}
function fetchAny(url,timeout){ return fetchDirect(url,timeout).catch(function(){ return fetchVia(url,timeout); }); }

// FinMind：免費公開台股 API（官方歷史資料）。如常被限流，可至 finmindtrade.com 免費註冊取得 token 填入下方。
var FINMIND_TOKEN="";

  return "https://api.finmindtrade.com/api/v4/data?dataset="+dataset+"&data_id="+code+"&start_date="+start+(FINMIND_TOKEN?("&token="+FINMIND_TOKEN):"");
}
function ymd(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
// 今年各月營收（官方），回傳 [{m,value(千元),official:true}]
function fetchMonthlyRevenue(code){
  var year=new Date().getFullYear();
  return fetchAny(fmURL("TaiwanStockMonthRevenue",code,(year-2)+"-01-01"),12000).then(function(j){
    if(!j||!Array.isArray(j.data)||!j.data.length) return null;
    var all={}; // 'YYYY-M' -> revenue(元)
    j.data.forEach(function(r){ all[Number(r.revenue_year)+"-"+Number(r.revenue_month)]=Number(r.revenue); });
    var yr=j.data.filter(function(r){return Number(r.revenue_year)===year;}).sort(function(a,b){return a.revenue_month-b.revenue_month;});
    if(!yr.length) return null;
    var list=yr.map(function(r){return {m:Number(r.revenue_month),value:Math.round(Number(r.revenue)/1000),official:true};});
    // 近三個月 YoY（與去年同月比）
    var yoy=[];
    for(var i=Math.max(0,list.length-3);i<list.length;i++){
      var mm=list[i].m, cur=all[year+"-"+mm], prev=all[(year-1)+"-"+mm];
      if(cur!=null&&prev!=null&&prev!==0) yoy.push((cur-prev)/prev*100);
    }
    return {year:list, yoy:yoy};
  }).catch(function(){return null;});
}
// 近 N 日三大法人（外資／投信／自營分項）買賣超（官方，股）
function fetchInstDaily(code){
  var start=new Date(); start.setDate(start.getDate()-40);
  return fetchAny(fmURL("TaiwanStockInstitutionalInvestorsBuySell",code,ymd(start)),12000).then(function(j){
    if(!j||!Array.isArray(j.data)||!j.data.length) return null;
    var byDate={};
    j.data.forEach(function(r){
      var net=(Number(r.buy)||0)-(Number(r.sell)||0);
      var nm=(r.name||"");
      if(!byDate[r.date]) byDate[r.date]={net:0,foreign:0,trust:0,dealer:0};
      byDate[r.date].net+=net;
      if(nm.indexOf("Foreign")>=0||nm.indexOf("外")>=0) byDate[r.date].foreign+=net;        // 外資（含外資自營）
      else if(nm.indexOf("Trust")>=0||nm.indexOf("投信")>=0) byDate[r.date].trust+=net;        // 投信
      else if(nm.indexOf("Dealer")>=0||nm.indexOf("自營")>=0) byDate[r.date].dealer+=net;       // 自營
    });
    var dates=Object.keys(byDate).sort();
    if(!dates.length) return null;
    var daily=dates.slice(-10).map(function(d){
      var p=d.split("-");
      return {date:(p.length===3?(Number(p[1])+"/"+Number(p[2])):d), net:byDate[d].net, foreign:byDate[d].foreign, trust:byDate[d].trust, dealer:byDate[d].dealer, official:true};
    });
    var foreign5=dates.slice(-5).reduce(function(a,d){return a+byDate[d].foreign;},0);
    return {daily:daily, foreign5:foreign5};
  }).catch(function(){return null;});
}

/* ===== 技術指標 ===== */
function computeMA(closes,n){
  var out=[]; for(var i=0;i<closes.length;i++){ if(i<n-1){out.push(null);continue;}
    var s=0,ok=true; for(var j=i-n+1;j<=i;j++){ if(closes[j]==null){ok=false;break;} s+=closes[j]; }
    out.push(ok?s/n:null);
  } return out;
}
function latestRSI(closes,n){ n=n||14; if(closes.length<n+1) return null;
  var s=closes.slice(-(n+1)),gain=0,loss=0;
  for(var i=1;i<s.length;i++){var d=s[i]-s[i-1]; if(d>=0)gain+=d; else loss+=-d;}
  if(gain===0&&loss===0) return 50; if(loss===0) return 100;
  var rs=(gain/n)/(loss/n); return 100-100/(1+rs);
}
function latestKD(highs,lows,closes,n){ n=n||9; if(closes.length<n) return {k:null,d:null};
  var k=50,d=50;
  for(var i=n-1;i<closes.length;i++){
    var hi=Math.max.apply(null,highs.slice(i-n+1,i+1)), lo=Math.min.apply(null,lows.slice(i-n+1,i+1));
    var rsv=hi===lo?50:((closes[i]-lo)/(hi-lo))*100; k=k*(2/3)+rsv*(1/3); d=d*(2/3)+k*(1/3);
  } return {k:k,d:d};
}
function industryAverage(companyInfo,valuation,industry){
  if(!Array.isArray(companyInfo)||!Array.isArray(valuation)||!industry) return null;
  var peer={}; companyInfo.forEach(function(r){ if(industryName(field(r,["產業別"]))===industry){ peer[field(r,["公司代號","Code"])]=1; }});
  var rows=valuation.filter(function(r){ return peer[field(r,["Code","證券代號"])]; });
  var pes=rows.map(function(r){return toNum(field(r,["PEratio","本益比"]));}).filter(function(v){return v!=null&&v>0;});
  var ys=rows.map(function(r){return toNum(field(r,["DividendYield","殖利率"]));}).filter(function(v){return v!=null;});
  var avg=function(a){return a.length?a.reduce(function(x,y){return x+y;},0)/a.length:null;};
  if(!rows.length||!pes.length) return null;
  return {peerCount:rows.length,avgPE:avg(pes),avgYield:avg(ys)};
}
// 均線格局（依三條均線排列）
// MA5＞MA10＞MA20（由上而下）→ 多方格局
// MA20＞MA10＞MA5（由上而下）→ 空方格局
// 其餘排列 → 格局破壞
function maPattern(close,ma5,ma10,ma20){
  if(ma5==null||ma10==null||ma20==null) return null;
  if(ma5>ma10 && ma10>ma20) return {label:"多方格局",tone:"bull",desc:"MA5＞MA10＞MA20，均線多頭排列。"};
  if(ma5<ma10 && ma10<ma20) return {label:"空方格局",tone:"bear",desc:"MA20＞MA10＞MA5，均線空頭排列。"};
  return {label:"格局破壞",tone:"neutral",desc:"均線非多頭亦非空頭排列，格局遭破壞。"};
}
// 止跌訊號：連續三天 K 棒愈收愈高，且在這三天內由「均線下方」站上任一條均線（5/10/20/60 任一）
function stopFallSignal(d){
  if(!d||d.length<3) return false;
  var n=d.length, x=d[n-3], y=d[n-2], z=d[n-1];
  if(x.close==null||y.close==null||z.close==null) return false;
  var rising = x.close<y.close && y.close<z.close;
  if(!rising) return false;
  var reclaimedAny=false;
  ["ma5","ma10","ma20","ma60"].forEach(function(key){
    if(x[key]!=null && z[key]!=null && x.close < x[key] && z.close >= z[key]) reclaimedAny=true;
  });
  return reclaimedAny;
}
// 最接近現價的均線（below=true 取下方最近者為支撐，否則取上方最近者為壓力）
function nearestMA(t,price,below){
  var ms=[t.ma5,t.ma10,t.ma20]; if(t.ma60!=null) ms.push(t.ma60);
  ms=ms.filter(function(x){return x!=null;});
  var cand=ms.filter(function(x){ return below? x<=price : x>=price; });
  if(!cand.length) return null;
  return below? Math.max.apply(null,cand) : Math.min.apply(null,cand);
}
// 區間前高／前低
function priorHighLow(d,lookback){
  var arr=d.slice(-lookback), hi=-Infinity, lo=Infinity;
  arr.forEach(function(b){ if(b.high!=null)hi=Math.max(hi,b.high); if(b.low!=null)lo=Math.min(lo,b.low); });
  return {high:isFinite(hi)?hi:null, low:isFinite(lo)?lo:null};
}
// 均線匯聚：MA5/10/20（有 MA60 則含）帶寬 ≤ 1.5%
// 絕佳買點：均線是否「匯聚在同一根K棒」——均線值落在最新K棒的高低範圍內即可（不需同一點）。
// 回傳等級：4＝MA5/10/20/60 皆在同一K棒；3＝MA5/10/20 在同一K棒；0＝未匯聚。
function maConvergeLevel(t){
  if(!t||!t.chartData||!t.chartData.length) return 0;
  var last=t.chartData[t.chartData.length-1];
  var H=last.high, L=last.low;
  if(H==null||L==null) return 0;
  function inBar(v){ return v!=null && v>=L && v<=H; }
  var three=inBar(t.ma5)&&inBar(t.ma10)&&inBar(t.ma20);
  if(!three) return 0;
  return inBar(t.ma60)?4:3;   // 四線同棒更強
}
function maConverge(t){ return maConvergeLevel(t)>0; }  // 三線或四線匯聚同一K棒，任一成立即為絕佳買點
// ATR(14)：平均真實波幅，用於波動率停損
function atr14(d,n){
  n=n||14; if(!d||d.length<n+1) return null;
  var trs=[];
  for(var i=1;i<d.length;i++){
    var h=d[i].high,l=d[i].low,pc=d[i-1].close;
    if(h==null||l==null||pc==null) continue;
    trs.push(Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc)));
  }
  if(trs.length<n) return null;
  var s=trs.slice(-n).reduce(function(a,b){return a+b;},0);
  return s/n;
}
// 技術點位評分：彙整「超漲／超跌」「區間整理位置」「絕佳買點」為單一分數（進場點位優劣）
// 超跌／低檔整理／均線匯聚 → 點位佳(+)；超漲／高檔整理 → 追高風險(−)
function techPointEval(t,targets,closePrice){
  if(!t||!t.chartData||!t.chartData.length) return null;
  var price=(closePrice!=null?closePrice:t.latestClose);
  var cd=t.chartData, n=cd.length, hl=priorHighLow(cd,60);
  var pricePos=(hl.high!=null&&hl.low!=null&&hl.high>hl.low)?(price-hl.low)/(hl.high-hl.low):null;
  var bias20=(t.ma20!=null&&t.ma20!==0)?(price-t.ma20)/t.ma20*100:null;
  var instArr=(targets||[]).map(function(x){return x.price;}).filter(function(v){return v!=null;});
  var instAvg=instArr.length?instArr.reduce(function(a,b){return a+b;},0)/instArr.length:null;
  // 超漲/超跌（價格區間位置＋法人均標＋月線乖離）
  var ks=0;
  if(pricePos!=null){ if(pricePos>0.85)ks++; else if(pricePos<0.15)ks--; }
  if(instAvg!=null){ if(price>instAvg*1.03)ks++; else if(price<instAvg*0.97)ks--; }
  if(bias20!=null){ if(bias20>10)ks++; else if(bias20<-10)ks--; }
  var kLabel=ks>=1?"超漲":ks<=-1?"超跌":"正常";
  // 區間整理位置（均線箱型）
  var last10=cd.slice(-10);
  var bH=Math.max.apply(null,last10.map(function(b){return b.high!=null?b.high:b.close;}));
  var bL=Math.min.apply(null,last10.map(function(b){return b.low!=null?b.low:b.close;}));
  var bMid=(bH+bL)/2, rangePct=bMid?(bH-bL)/bMid*100:null;
  var ma20now=cd[n-1].ma20, ma20ago=(n>=10?cd[n-10].ma20:null);
  var maSlope=(ma20now!=null&&ma20ago!=null&&ma20ago!==0)?(ma20now-ma20ago)/ma20ago*100:null;
  var maFlat=maSlope!=null&&Math.abs(maSlope)<3;
  var consolidating=(rangePct!=null&&rangePct<12)&&(maFlat||rangePct<6);
  var pos=(hl.high!=null&&hl.low!=null&&hl.high>hl.low)?(bMid-hl.low)/(hl.high-hl.low):null;
  var boxLabel=!consolidating?"趨勢中":(pos!=null&&pos<0.4?"低檔整理":pos!=null&&pos>0.6?"高檔整理":"橫盤整理");
  var conv=maConverge(t);
  // 進場點位評分
  var sc=0, why=[];
  if(kLabel==="超跌"){ sc+=0.5; why.push("超跌·點位便宜"); }
  else if(kLabel==="超漲"){ sc-=0.5; why.push("超漲·追高風險"); }
  if(boxLabel==="低檔整理"){ sc+=0.4; why.push("低檔整理"); }
  else if(boxLabel==="高檔整理"){ sc-=0.4; why.push("高檔整理"); }
  if(conv){ sc+=0.3; why.push("均線匯聚買點"); }
  sc=Math.max(-1,Math.min(1,sc));
  if(!why.length) why.push("點位中性");
  return {score:sc,kLabel:kLabel,boxLabel:boxLabel,bias20:bias20,note:why.join("、")};
}

/* ===== 評分引擎 v2 ===== */
var CYCLICAL=["航運業","鋼鐵工業","水泥工業","塑膠工業","紡織纖維","造紙工業","橡膠工業","玻璃陶瓷","油電燃氣業","化學工業","汽車工業"];
var GROWTH=["生技醫療業","生技醫療","綠能環保","數位雲端","電子商務"];
// 強制景氣循環股關鍵字（比對產業別＋個股名稱）
var CYCLICAL_KEYWORDS=["航運","散裝","貨櫃","鋼鐵","鋼","不鏽鋼","水泥","塑膠","塑化","石化","橡膠","玻璃","造紙","面板","記憶體","DRAM","快閃","晶圓","紡織"];
// 名稱／產業關鍵字抓不到的（面板雙虎、記憶體、成熟製程晶圓代工等）以代號強制標記
var CYCLICAL_TICKERS={
 "2409":"面板","3481":"面板","6116":"面板","8069":"面板",
 "2344":"記憶體","2408":"記憶體","2337":"記憶體","5351":"記憶體","4967":"記憶體","8261":"記憶體",
 "2303":"晶圓代工成熟製程","5347":"晶圓代工成熟製程","6770":"晶圓代工成熟製程",
 "2002":"鋼鐵","2603":"航運","2609":"航運","2615":"航運","2606":"航運","2610":"航運",
 "1301":"塑化","1303":"塑化","1326":"塑化","6505":"塑化","1101":"水泥","1102":"水泥"
};
function classifyIndustry(ind){
  if(!ind) return "general";
  for(var i=0;i<CYCLICAL.length;i++) if(ind.indexOf(CYCLICAL[i])>=0) return "cyclical";
  for(var j=0;j<GROWTH.length;j++) if(ind.indexOf(GROWTH[j])>=0) return "growth";
  return "general";
}
// 強制景氣循環股偵測：代號命中、或產業/名稱含關鍵字 → 自動啟動循環股評分模式
function cyclicalAutoDetect(code,industry,name){
  if(code && CYCLICAL_TICKERS[code]) return {hit:true,reason:CYCLICAL_TICKERS[code]};
  var hay=String(industry||"")+" "+String(name||"");
  for(var i=0;i<CYCLICAL_KEYWORDS.length;i++){ if(hay.indexOf(CYCLICAL_KEYWORDS[i])>=0) return {hit:true,reason:CYCLICAL_KEYWORDS[i]}; }
  return {hit:false,reason:null};
}
// 由日線收盤陣列產生週線收盤（取每週最後一筆）
function weeklyCloses(hist){
  if(!hist||!hist.length) return [];
  var byWk={}, order=[];
  hist.forEach(function(h){
    var p=String(h.date).split("/"); if(p.length<3) return;
    var d=new Date(+p[0],+p[1]-1,+p[2]);
    var onejan=new Date(d.getFullYear(),0,1);
    var wk=d.getFullYear()+"-"+Math.ceil(((d-onejan)/86400000+onejan.getDay()+1)/7);
    if(!(wk in byWk)) order.push(wk);
    byWk[wk]=h.close;
  });
  return order.map(function(w){return byWk[w];});
}
function maOf(arr,n){ if(arr.length<n) return null; var s=0; for(var i=arr.length-n;i<arr.length;i++) s+=arr[i]; return s/n; }
function patternOf(closes){
  if(closes.length<20) return null;
  return maPattern(closes[closes.length-1],maOf(closes,5),maOf(closes,10),maOf(closes,20));
}
// 週線 MACD（由日線聚合週收盤計算）。bull=多頭區間（非死叉下行）：柱狀體>0，或柱狀體仍負但正在收斂上行。
function emaArr(arr,n){ if(!arr.length) return []; var k=2/(n+1), out=[arr[0]]; for(var i=1;i<arr.length;i++) out.push(arr[i]*k+out[i-1]*(1-k)); return out; }
function weekMACDof(hist){
  var wc=weeklyCloses(hist); if(wc.length<27) return null;
  var e12=emaArr(wc,12), e26=emaArr(wc,26), dif=[];
  for(var i=0;i<wc.length;i++) dif.push(e12[i]-e26[i]);
  var dea=emaArr(dif,9), hh=[];
  for(var j=0;j<dif.length;j++) hh.push(dif[j]-dea[j]);
  var n=hh.length, h=hh[n-1], hp=hh[n-2];
  var bull=(h>0)||(h>hp);
  return {hist:h, prev:hp, dif:dif[n-1], dea:dea[n-1], bull:bull};
}
function betaCalc(stockHist,indexHist){
  if(!stockHist||!indexHist||stockHist.length<30||indexHist.length<30) return null;
  var im={}; indexHist.forEach(function(r){im[r.date]=r.close;});
  var xs=[],ys=[];
  for(var i=1;i<stockHist.length;i++){
    var d=stockHist[i].date, dp=stockHist[i-1].date;
    if(im[d]==null||im[dp]==null||stockHist[i-1].close==null) continue;
    var rs=(stockHist[i].close-stockHist[i-1].close)/stockHist[i-1].close;
    var ri=(im[d]-im[dp])/im[dp];
    xs.push(ri); ys.push(rs);
  }
  if(xs.length<20) return null;
  var n=xs.length, mx=xs.reduce(function(a,b){return a+b;},0)/n, my=ys.reduce(function(a,b){return a+b;},0)/n;
  var cov=0,varx=0;
  for(var k=0;k<n;k++){ cov+=(xs[k]-mx)*(ys[k]-my); varx+=(xs[k]-mx)*(xs[k]-mx); }
  if(varx===0) return null;
  return cov/varx;
}
function annualVol(indexHist){
  if(!indexHist||indexHist.length<22) return null;
  var r=[]; for(var i=indexHist.length-21;i<indexHist.length;i++){ if(indexHist[i-1]&&indexHist[i-1].close) r.push((indexHist[i].close-indexHist[i-1].close)/indexHist[i-1].close); }
  if(r.length<10) return null;
  var m=r.reduce(function(a,b){return a+b;},0)/r.length, v=0;
  r.forEach(function(x){v+=(x-m)*(x-m);}); v/=r.length;
  return Math.sqrt(v)*Math.sqrt(252)*100; // 年化波動%
}
function marketRegime(indexHist){
  if(!indexHist||indexHist.length<60) return {mode:"unknown",label:"大盤資料不足",tone:"neutral",vol:null,bias60:null,overheated:false};
  var closes=indexHist.map(function(r){return r.close;});
  var c=closes[closes.length-1], ma20=maOf(closes,20), ma60=maOf(closes,60);
  var vol=annualVol(indexHist);
  var highVol=vol!=null&&vol>26;
  var bias60=(ma60&&ma60!==0)?((c-ma60)/ma60*100):null;   // 大盤相對季線乖離率（Bias）
  var overheated=(bias60!=null&&bias60>10);                // 季線乖離 > +10% → 高檔過熱
  var bull=c>ma20&&ma20>ma60, bear=c<ma20&&ma20<ma60;
  var base;
  if(highVol&&bear) base={mode:"risk",label:"系統性風險（空頭＋高波動）",tone:"bear"};
  else if(highVol) base={mode:"volatile",label:"高波動震盪",tone:"neutral"};
  else if(bull) base={mode:"bull",label:"大盤多頭",tone:"bull"};
  else if(bear) base={mode:"bear",label:"大盤空頭",tone:"bear"};
  else base={mode:"range",label:"大盤區間震盪",tone:"neutral"};
  base.vol=vol; base.bias60=bias60; base.overheated=overheated;
  if(overheated&&(base.mode==="bull"||base.mode==="range")) base.label+="（季線乖離 +"+bias60.toFixed(1)+"%，高檔過熱）";
  return base;
}

// 動態權重基準（依市場狀態調整）
function regimeWeights(mode,overheated){
  var w={trend:1.5,momentum:1.2,valuation:1.0,chips:1.3,liquidity:0.8,defensive:0.8,margin:0.8,techpoint:1.1};
  if(mode==="bull"){ w.trend*=1.2; w.valuation*=1.1; w.momentum*=1.1; w.defensive*=0.6; w.techpoint*=0.9; }
  else if(mode==="bear"||mode==="risk"){ w.trend*=0.8; w.valuation*=0.6; w.chips*=1.3; w.liquidity*=1.6; w.defensive*=1.8; w.margin*=1.2; w.techpoint*=1.2; }
  else if(mode==="volatile"){ w.valuation*=0.8; w.defensive*=1.4; w.liquidity*=1.3; w.techpoint*=1.3; }
  // 高檔過熱：調降技術面（趨勢）權重，避免牛市末端因均線多頭而催促追高；提高防禦與估值的相對話語權
  if(overheated){ w.trend*=0.55; w.momentum*=0.85; w.defensive*=1.5; w.valuation*=1.2; w.techpoint*=1.2; }
  return w;
}

function computeScore(ctx){
  var notes=[], blind=[], factors=[];
  var autoCyc = ctx.cyclicalAuto || ctx.industryClass==="cyclical";   // 自動/產業判定的循環股
  var cls=((ctx.forceCyclical||autoCyc)?"cyclical":ctx.industryClass), regime=ctx.regime, mode=regime.mode;

  // ===== 自適應流動性（取代固定張數一票否決）=====
  // 中小型股（股本 < 20 億）若出現「量能異常放大」（今日量 ≥ 20 日均量 ×2），
  // 視為主力進場的「潛力潛伏股」，解除流動性否決。
  var smallCap = ctx.capital!=null && ctx.capital<20;     // 股本 < 20 億
  var capUnknown = ctx.capital==null;
  var volSurge = ctx.relVol!=null && ctx.relVol>=2;       // 今日量 ≥ 20 日均量 2 倍
  var ambush = volSurge && (smallCap || capUnknown);      // 潛力潛伏股模式

  var kill=null;
  if(ctx.disposition) kill={reason:"列為處置／全額交割股"};
  else if(ctx.avgVolLots!=null && ctx.avgVolLots<30 && !ambush)
    kill={reason:"日均成交量僅約 "+fmtNum(ctx.avgVolLots)+" 張，且無量能放大，流動性嚴重不足"};

  // IPO / 新股模式：歷史不足
  var ipo=ctx.historyDays!=null && ctx.historyDays<60;

  var overheated=regime.overheated;
  var W=regimeWeights(mode,overheated);

  // ===== 財報時間差打折（Data Recency Decay）=====
  // 距上次財報 > 2 個月 → 基本面（毛利率/EPS/估值/動能）權重打 8 折，提示空窗期風險。
  var recencyDecay = ctx.monthsSinceReport!=null && ctx.monthsSinceReport>2;
  if(recencyDecay){ W.momentum*=0.8; W.valuation*=0.8; }

  function push(key,label,score,weight,note,group){ factors.push({key:key,label:label,score:score,weight:weight,note:note,group:group}); }

  // 1) 趨勢（週線定趨勢、日線找買點 — Lead-Lag Filter）
  if(!ipo && ctx.dayPattern){
    var dp=ctx.dayPattern, wp=ctx.weekPattern, wMACD=ctx.weekMACD;
    var weeklyUp = wMACD ? wMACD.bull : (wp?(wp.tone==="bull"?true:wp.tone==="bear"?false:null):null);
    var dayGolden = ctx.dayGoldenCross;
    var ds=dp.tone==="bull"?1:dp.tone==="bear"?-1:0;
    var ts, tnote;
    if(weeklyUp===true && dayGolden){ ts=1; tnote="週線多頭定調＋日線黃金交叉，買點成立（提高訊號頻率）"; }
    else if(weeklyUp===true && ds>0){ ts=0.7; tnote="週線多頭，日線同向偏多"; }
    else if(weeklyUp===true && ds<0){ ts=0.1; tnote="週線多頭但日線回檔，待日線轉強再進"; }
    else if(weeklyUp===false && ds>0){ ts=-0.2; tnote="週線轉弱（MACD 死叉下行），日線反彈宜偏短"; blind.push("週線 MACD 死叉下行，日線多頭恐僅是反彈，逆勢風險高"); }
    else if(weeklyUp===false){ ts=-1; tnote="週線＋日線同步偏空"; }
    else { ts=ds*0.6; tnote="日線"+dp.label+"（週線資料不足）"; }
    if(overheated){ ts=Math.min(ts,0.3); tnote+="；大盤高檔過熱，技術面權重已調降"; }
    push("trend","趨勢（週定調·日買點）",ts,W.trend,tnote,"tech");
  } else push("trend","趨勢（週定調·日買點）",null,W.trend,ipo?"新股上市未滿 60 日，暫不計入均線":"資料不足","tech");

  // 2) 基本面動能（一般股：YoY 連續遞增為佳；循環股：高 YoY＋低 PE 反為高點陷阱）
  if(ipo){ push("momentum","營收動能（YoY 趨勢）",null,W.momentum,"新股財報期數不足","funda"); }
  else if(cls==="cyclical" && ctx.revYoY && ctx.revYoY.length){
    var lastYoY=ctx.revYoY[ctx.revYoY.length-1];
    var peLow=ctx.peVsIndustry!=null && ctx.peVsIndustry<-0.2;
    var yoyHigh=lastYoY!=null && lastYoY>30;
    if(yoyHigh && peLow){
      push("momentum","營收動能（循環股·反轉判讀）",-0.7,W.momentum,"YoY 達高檔（"+lastYoY.toFixed(0)+"%）且 PE 偏低，典型景氣高點陷阱，扣分","cyclical");
      blind.push("景氣循環股高點陷阱：營收 YoY 衝高＋低本益比，往往是獲利高峰、股價將反轉");
    } else if(lastYoY!=null && lastYoY<-10){
      push("momentum","營收動能（循環股·反轉判讀）",0.4,W.momentum,"YoY 落底（"+lastYoY.toFixed(0)+"%），循環股谷底常為布局起點","cyclical");
    } else {
      push("momentum","營收動能（循環股·反轉判讀）",0,W.momentum,"循環股不以 YoY 高低單純加減分，改看 PB 與毛利率","cyclical");
    }
  }
  else if(ctx.revYoY && ctx.revYoY.length>=2){
    var arr=ctx.revYoY, rising=true, allPos=true;
    for(var i=1;i<arr.length;i++){ if(arr[i]<arr[i-1]) rising=false; }
    arr.forEach(function(v){ if(v<=0) allPos=false; });
    var ms = rising&&allPos?1 : rising?0.5 : (arr[arr.length-1]<arr[0]?-0.7:0);
    var mnote = rising&&allPos?"近"+arr.length+"月營收 YoY 連續遞增且為正，動能強":rising?"營收 YoY 遞增但部分為負":"營收 YoY 動能轉弱";
    if(ms<=0) blind.push("營收年增動能轉弱（YoY 未連續成長），成長性存疑");
    push("momentum","營收動能（YoY 趨勢）",ms,W.momentum,mnote,"funda");
  } else push("momentum","營收動能（YoY 趨勢）",null,W.momentum,"營收資料不足","funda");

  // 3) 估值（循環股改以 PB＋毛利率轉折為核心）
  if(ctx.isETF){ push("valuation","估值",null,W.valuation*0.5,"ETF 不適用","funda"); }
  else if(cls==="cyclical"){
    var vs2=0, parts=[], hasV=false;
    if(ctx.pb!=null){ hasV=true;
      if(ctx.pb<1){ vs2+=0.6; parts.push("PB "+ctx.pb.toFixed(2)+"（近淨值，便宜）"); }
      else if(ctx.pb>3){ vs2-=0.5; parts.push("PB "+ctx.pb.toFixed(2)+"（偏貴）"); }
      else parts.push("PB "+ctx.pb.toFixed(2));
    }
    if(ctx.grossMargin){ hasV=true;
      if(ctx.grossMargin.trend==="up"){ vs2+=0.4; parts.push("毛利率回升"); }
      else if(ctx.grossMargin.trend==="down"){ vs2-=0.5; parts.push("毛利率下滑"); blind.push("循環股毛利率轉折向下，獲利動能恐已過高峰"); }
      else parts.push("毛利率持平");
    }
    push("valuation","估值（循環股·PB＋毛利率）",hasV?Math.max(-1,Math.min(1,vs2)):null,W.valuation,hasV?parts.join("、"):"PB／毛利率資料不足","cyclical");
  } else if(cls==="growth"){
    var vs3 = ctx.peVsIndustry==null?null:(ctx.peVsIndustry<-0.1?0.4:ctx.peVsIndustry>0.5?-0.3:0.1);
    push("valuation","估值（高成長）",vs3,W.valuation*0.5,"高成長股以成長性為主，本益比僅輔助參考","funda");
  } else {
    var vs = ctx.peVsIndustry==null?null:(ctx.peVsIndustry<-0.1?1:ctx.peVsIndustry>0.1?-1:0);
    push("valuation","估值（相對同業）",vs,W.valuation,ctx.peVsIndustry==null?"資料不足":("本益比較同業"+(ctx.peVsIndustry>=0?"高":"低")+" "+Math.abs(ctx.peVsIndustry*100).toFixed(0)+"%"),"funda");
  }

  // 4) 籌碼／法人（含外資趨勢）
  var chipScore=null, cnote="";
  if(ctx.instNet!=null){
    var s1=ctx.instNet>0?0.5:ctx.instNet<0?-0.5:0;
    var s2=ctx.foreign5==null?0:(ctx.foreign5>0?0.5:ctx.foreign5<0?-0.5:0);
    chipScore=Math.max(-1,Math.min(1,s1+s2));
    cnote="最新法人"+(ctx.instNet>0?"買超":"賣超")+(ctx.foreign5!=null?("、近5日外資"+(ctx.foreign5>0?"淨買":"淨賣")):"");
    if(ctx.foreign5!=null&&ctx.foreign5<0) blind.push("外資近 5 日站在賣方，上漲動能與籌碼面背離風險");
  }
  push("chips","籌碼／法人動向",chipScore,W.chips,cnote||"資料不足","chips");

  // 5) 流動性（自適應）
  var liqScore=null, lnote="";
  if(ambush){
    liqScore=0.3; lnote="量能放大 "+(ctx.relVol!=null?ctx.relVol.toFixed(1)+"×":"")+"（潛伏股，否決已解除）";
  } else if(ctx.avgVolLots!=null){
    liqScore = ctx.avgVolLots<300? -0.8 : ctx.avgVolLots<1000? -0.2 : ctx.avgVolLots>5000?0.3:0;
    lnote="日均量約 "+fmtNum(ctx.avgVolLots)+" 張"+(ctx.relVol!=null?"、相對量 "+ctx.relVol.toFixed(2)+"×":"");
    if(ctx.avgVolLots<500) blind.push("流動性偏低（日均量 "+fmtNum(ctx.avgVolLots)+" 張），大額進出滑價風險高");
  }
  push("liquidity","流動性（自適應）",liqScore,W.liquidity,lnote||"資料不足","chips");

  // 6) 防禦因子（Beta、負債比）
  var defScore=null, dnote=[];
  if(ctx.beta!=null){
    var hi=ctx.beta>1.3;
    var penalty=(mode==="bear"||mode==="risk"||mode==="volatile")?(hi?-0.8:ctx.beta<0.8?0.4:0):(hi?-0.2:0.1);
    defScore=(defScore||0)+penalty;
    dnote.push("β≈"+ctx.beta.toFixed(2));
    if(hi&&(mode==="bear"||mode==="risk"||mode==="volatile")) blind.push("高 Beta（"+ctx.beta.toFixed(2)+"）遇大盤弱勢，回檔放大風險");
  }
  if(ctx.debtRatio!=null){
    var dp2=ctx.debtRatio>60?-0.5:ctx.debtRatio<35?0.2:0;
    defScore=(defScore||0)+dp2;
    dnote.push("負債比 "+ctx.debtRatio.toFixed(0)+"%");
    if(ctx.debtRatio>60) blind.push("負債比偏高（"+ctx.debtRatio.toFixed(0)+"%），升息或景氣下行抗壓較弱");
  }
  if(defScore!=null) defScore=Math.max(-1,Math.min(1,defScore));
  push("defensive","防禦因子（β／負債）",defScore,W.defensive,dnote.length?dnote.join("、"):"資料不足","risk");

  // 7) 融資籌碼（券資比 / 融資動向）
  var mScore=null, mnote2="";
  if(ctx.shortMarginRatio!=null){
    mScore=ctx.shortMarginRatio>30?-0.4:ctx.shortMarginRatio<10?0.3:0;
    mnote2="券資比 "+ctx.shortMarginRatio.toFixed(1)+"%";
  }
  if(ctx.marginDelta!=null&&ctx.priceChangeSign!=null&&ctx.marginDelta>0&&ctx.priceChangeSign>0){
    mScore=(mScore||0)-0.3; blind.push("融資追價（融資增、股價漲），散戶籌碼轉重");
  }
  push("margin","融資籌碼",mScore==null?null:Math.max(-1,Math.min(1,mScore)),W.margin,mnote2||"資料不足","chips");

  // 技術分析（僅在出現止跌訊號時計入評分）
  if(ctx.stopFall){
    var taScore=0.6, taParts=["止跌訊號：有"];
    if(ctx.converge){ taScore+=0.3; taParts.push("均線匯聚（潛在買點）"); }
    taScore=Math.min(1,taScore);
    push("ta","技術分析",taScore,W.trend*0.7,taParts.join("、"),"tech");
  }

  // 技術點位評分（單獨歸類：超漲跌·區間整理·買點 → 進場點位優劣）
  if(ctx.techPoint){
    push("techpoint","技術點位評分",ctx.techPoint.score,W.techpoint,
      ctx.techPoint.note+"（現價 "+ctx.techPoint.kLabel+"·"+ctx.techPoint.boxLabel+"）","techpoint");
  }

  // 加權合計
  var num=0,den=0;
  factors.forEach(function(f){ if(f.score!=null){ num+=f.score*f.weight; den+=f.weight; } });
  var raw=den?num/den:0;

  // 等級
  var grade;
  if(kill) grade={label:"危險（觸發保護機制）",tone:"bear",score:raw};
  else if(ipo) grade={label:"新股觀察",tone:"neutral",score:raw};
  else if(raw>=0.4) grade={label:"強勢偏多",tone:"bull",score:raw};
  else if(raw>=0.15) grade={label:"偏多",tone:"bull",score:raw};
  else if(raw>-0.15) grade={label:"中性",tone:"neutral",score:raw};
  else if(raw>-0.4) grade={label:"偏空",tone:"bear",score:raw};
  else grade={label:"弱勢偏空",tone:"bear",score:raw};

  // 核心結論與策略
  var concl;
  if(kill) concl={can:false,strategy:"不建議操作",text:"觸發保護機制（"+kill.reason+"），不論其他指標如何，列為危險級。"};
  else if(ipo) concl={can:true,strategy:"高風險短線、嚴控部位",text:"新股上市未滿 60 日，缺乏均線與完整財報基準；僅適合高風險短線，務必嚴設停損與控制部位。"};
  else {
    var bullMkt=(mode==="bull");
    if(grade.tone==="bull"&&bullMkt) concl={can:true,strategy:"波段／中長期布局",text:"個股偏多且大盤多頭，順勢可作波段，回測均線不破可續抱。"};
    else if(grade.tone==="bull"&&!bullMkt) concl={can:true,strategy:"僅短線、嚴設停損",text:"個股偏多但大盤非多頭，屬逆勢操作，僅宜短線且嚴設停損。"};
    else if(grade.tone==="neutral") concl={can:false,strategy:"觀望",text:"多空訊號交雜，建議觀望，等待趨勢與籌碼同步明確再進場。"};
    else concl={can:false,strategy:"偏空／空手",text:"偏空格局，不宜做多；持有者留意停損，空手者觀望或偏空操作。"};
    // 價值補充
    if(cls==="general"&&grade.tone!=="bear"){
      var valF=factors.filter(function(f){return f.key==="valuation";})[0];
      var momF=factors.filter(function(f){return f.key==="momentum";})[0];
      if(valF&&valF.score>0&&momF&&momF.score>0) concl.text+=" 估值具吸引力且營收動能向上，亦適合分批長期布局。";
    }
  }

  if(grade.tone==="bull"&&(mode==="bear"||mode==="risk")) blind.push("個股偏多但大盤空頭／高風險，系統性下跌時恐難獨善其身");
  if(overheated) blind.push("大盤季線乖離 +"+(regime.bias60!=null?regime.bias60.toFixed(1):"?")+"%，處高檔過熱區，追高風險大、宜分批或等回檔");
  if(recencyDecay) blind.push("距上次財報已逾 "+ctx.monthsSinceReport+" 個月，基本面數據具時間滯後性，已調降基本面權重，留意財報空窗期突發風險");

  if(overheated && concl.can){ concl.strategy="高檔過熱·分批不追高"; concl.text+=" 但大盤季線乖離過高、已現高檔過熱，切忌追高，建議等拉回均線再分批。"; }
  if(ambush && !kill){ concl.text+=" 另偵測到中小型股量能異常放大（潛力潛伏股），可留意主力是否進場，但務必嚴設停損。"; }

  // ===== 出場策略 / 防守價（ATR + 結構均線）=====
  var exit=null;
  if(ctx.price!=null){
    var price=ctx.price, atr=ctx.atr;
    var struct=null; // 最接近且低於現價的結構均線（月線 MA20 優先，其次季線 MA60）
    [{n:"月線 MA20",v:ctx.ma20},{n:"季線 MA60",v:ctx.ma60}].forEach(function(m){
      if(m.v!=null && m.v<price){ if(struct==null||m.v>struct.v) struct={n:m.n,v:m.v}; }
    });
    var atrStop=(atr!=null)?price-2*atr:null;       // 2×ATR 動態停損
    var cands=[]; if(struct) cands.push(struct.v); if(atrStop!=null) cands.push(atrStop);
    cands=cands.filter(function(x){return x<price;});
    var defend=cands.length?Math.max.apply(null,cands):null;   // 取較貼近現價者為防守價格
    var basis=(struct&&defend===struct.v)?("收盤跌破"+struct.n):(atrStop!=null&&defend===atrStop?"收盤跌破 2×ATR 動態停損":"");
    exit={price:price, atr:atr, atrPct:(atr!=null&&price?atr/price*100:null),
      ma20:ctx.ma20, ma60:ctx.ma60, atrStop:atrStop, struct:struct,
      defend:defend, defendPct:(defend!=null&&price?(defend-price)/price*100:null), basis:basis};
  }

  // 盲點去重、限量
  var seen={}, blind2=[];
  blind.forEach(function(b){ if(!seen[b]){seen[b]=1; blind2.push(b);} });
  if(!blind2.length) blind2.push("目前未偵測到明顯背離；仍須留意大盤系統性風險與個股突發消息。");

  return {regime:regime,industryClass:cls,cyclicalActive:(cls==="cyclical"),cyclicalAuto:autoCyc,cyclicalReason:(ctx.cyclicalReason||(ctx.industryClass==="cyclical"?"產業別":null)),
    recencyDecay:recencyDecay,monthsSinceReport:(ctx.monthsSinceReport!=null?ctx.monthsSinceReport:null),exit:exit,
    kill:kill,ipo:ipo,overheated:overheated,ambush:ambush,factors:factors,raw:raw,grade:grade,conclusion:concl,blindspots:blind2.slice(0,5)};
}

/* ===== 示範資料（種子亂數） ===== */
function seedFrom(str){var h=2166136261; for(var i=0;i<str.length;i++){h^=str.charCodeAt(i); h=Math.imul(h,16777619);} return h>>>0;}
function mulberry32(a){return function(){a|=0;a=(a+0x6d2b79f5)|0;var t=Math.imul(a^(a>>>15),1|a);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}
function makeDemo(code,fallbackName){
  var rnd=mulberry32(seedFrom(code));
  var isETF=/^00\d{2,3}/.test(code);
  var name=NAME_MAP[code]||fallbackName||(isETF?"示範 ETF":"示範個股");
  var today=new Date(), price=20+Math.floor(rnd()*180), momentum=(rnd()-0.5)*0.01, hist=[];
  for(var i=69;i>=0;i--){
    momentum=momentum*0.9+(rnd()-0.5)*0.012; price=Math.max(5,price*(1+momentum));
    var high=price*(1+rnd()*0.018), low=price*(1-rnd()*0.018), open=low+(high-low)*rnd();
    var d=new Date(today); d.setDate(d.getDate()-i);
    hist.push({date:d.getFullYear()+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+String(d.getDate()).padStart(2,"0"),
      open:open,high:high,low:low,close:price});
  }
  var closePrice=hist[hist.length-1].close, change=closePrice-hist[hist.length-2].close;
  var curRevenue=Math.floor(price*1000*(0.4+rnd()*1.6));
  var revYoY=rnd()*40-14, revMoM=rnd()*22-9;
  var d2=new Date(); d2.setMonth(d2.getMonth()-1);
  var pe=+(8+rnd()*28).toFixed(2), yieldPct=+(rnd()*6).toFixed(2), pb=+(0.8+rnd()*4.5).toFixed(2);
  return {
    name:name, isETF:isETF, industry:DEMO_INDUSTRIES[Math.floor(rnd()*DEMO_INDUSTRIES.length)],
    closePrice:closePrice, change:change, hist:hist,
    revYoY:revYoY, revMoM:revMoM, curRevenue:curRevenue,
    lastYearRevenue:curRevenue/(1+revYoY/100), lastMonthRevenue:curRevenue/(1+revMoM/100),
    yearMonth:(d2.getFullYear()-1911)+String(d2.getMonth()+1).padStart(2,"0"),
    foreignNet:Math.floor((rnd()-0.45)*8000)*1000, trustNet:Math.floor((rnd()-0.45)*2000)*1000, dealerNet:Math.floor((rnd()-0.5)*1000)*1000,
    marginBalance:Math.floor(5000+rnd()*45000)*1000, marginDelta:Math.floor((rnd()-0.5)*2400)*1000,
    shortBalance:Math.floor(rnd()*3000)*1000, shortDelta:Math.floor((rnd()-0.5)*600)*1000,
    pe:pe, yieldPct:yieldPct, pb:pb,
    capital:+(3+rnd()*120).toFixed(1),
    grossMargin:(function(){var base=10+rnd()*45, tr=(rnd()-0.5)*6, trend=tr>0.8?"up":tr<-0.8?"down":"flat";return {trend:trend,latest:+base.toFixed(1),prev:+(base-tr).toFixed(1),diff:+tr.toFixed(1),series:[]};})(),
    reportDate:(function(){var d=new Date(); d.setMonth(d.getMonth()-(Math.floor(rnd()*4)+1)); d.setDate(15); return ymd(d);})(),
    foreignHold:+(5+rnd()*70).toFixed(2), insiderHold:+(5+rnd()*35).toFixed(2), dayTrade:+(5+rnd()*40).toFixed(2),
    yearRevenue:(function(){var now=new Date(),curM=now.getMonth()+1,arr=[];for(var mm=1;mm<=curM;mm++){arr.push({m:mm,value:Math.round(curRevenue*(0.7+rnd()*0.6)),official:false});}return arr;})(),
    revYoY:(function(){var a=[],base=rnd()*30-10;for(var i=0;i<3;i++){base+=(rnd()-0.4)*8;a.push(+base.toFixed(1));}return a;})(),
    analystTargets:(function(){
      var firms=["高盛","摩根士丹利","瑞銀","美銀美林","花旗","野村","摩根大通","麥格理","元大投顧","群益投顧","凱基投顧","富邦投顧"];
      var now=new Date(), used={}, out=[];
      for(var i=0;i<5;i++){
        var fi; do{ fi=Math.floor(rnd()*firms.length); }while(used[fi]); used[fi]=1;
        var dd=new Date(now); dd.setDate(dd.getDate()-Math.floor(rnd()*30));
        out.push({ts:dd.getTime(), date:(dd.getMonth()+1)+"/"+dd.getDate(), firm:firms[fi], price:+(closePrice*(0.9+rnd()*0.35)).toFixed(1)});
      }
      out.sort(function(a,b){return b.ts-a.ts;});
      return out;
    })(),
    instDaily:(function(){var now=new Date(),arr=[];for(var i=9;i>=0;i--){var dd=new Date(now);dd.setDate(dd.getDate()-i);var f=Math.floor((rnd()-0.45)*6000)*1000,tr=Math.floor((rnd()-0.45)*1500)*1000,de=Math.floor((rnd()-0.5)*900)*1000;arr.push({date:(dd.getMonth()+1)+"/"+dd.getDate(),net:f+tr+de,foreign:f,trust:tr,dealer:de,official:false});}return arr;})(),
    marginDaily:(function(){var now=new Date(),arr=[],mb=20000+Math.floor(rnd()*40000),sb=2000+Math.floor(rnd()*8000);for(var i=9;i>=0;i--){var dd=new Date(now);dd.setDate(dd.getDate()-i);mb+=Math.floor((rnd()-0.5)*2000);sb+=Math.floor((rnd()-0.5)*600);if(mb<1000)mb=1000;if(sb<100)sb=100;arr.push({date:(dd.getMonth()+1)+"/"+dd.getDate(),marginBal:mb,shortBal:sb,ratio:sb/mb*100,official:false});}return arr;})(),
    indAvg:{peerCount:8+Math.floor(rnd()*28),avgPE:+(pe*(0.8+rnd()*0.5)).toFixed(2),avgYield:+(yieldPct*(0.7+rnd()*0.7)).toFixed(2)}
  };
}

function buildView(code,fallbackName,rows,demo,updating){
  var priceRow=rows.priceRow,valRow=rows.valRow,marginRow=rows.marginRow,instRow=rows.instRow,
      infoRow=rows.infoRow,revRow=rows.revRow,liveIndAvg=rows.indAvg,liveHist=rows.hist,rt=rows.realtime;

  var industry=industryName(field(infoRow,["產業別"]))||null;   // 代碼轉名稱；抓不到留 null（顯示「暫缺」）

    {label:"去年同月",value:revLive?toNum(field(revRow,["去年當月營收"])):demo.lastYearRevenue},
    {label:"上月",value:revLive?toNum(field(revRow,["上月營收"])):demo.lastMonthRevenue},

    yearList=demo.yearRevenue.map(function(e){return {m:e.m,value:e.value,official:false};});

    if(revLive){
      var curMonthVal=toNum(field(revRow,["當月營收"])), lastMonthVal=toNum(field(revRow,["上月營收"]));
      if(yearList.length>=1&&curMonthVal!=null){ yearList[yearList.length-1].value=curMonthVal; yearList[yearList.length-1].official=true; }
      if(yearList.length>=2&&lastMonthVal!=null){ yearList[yearList.length-2].value=lastMonthVal; yearList[yearList.length-2].official=true; }
    }
  }

  var instLive=!!instRow;
  var foreignNet=instLive?toNum(field(instRow,["外資及陸資買賣超股數","外資買賣超股數"])):demo.foreignNet;
  var trustNet=instLive?toNum(field(instRow,["投信買賣超股數"])):demo.trustNet;
  var dealerNet=instLive?toNum(field(instRow,["自營商買賣超股數合計","自營商買賣超股數"])):demo.dealerNet;
  var totalNet=(foreignNet||0)+(trustNet||0)+(dealerNet||0);
  var instChartData=[{label:"外資",value:foreignNet||0},{label:"投信",value:trustNet||0},{label:"自營商",value:dealerNet||0}];
  var instDaily, instOfficialAll=false, foreign5=null;
  if(rows.instDailyLive&&rows.instDailyLive.daily&&rows.instDailyLive.daily.length){
    instDaily=rows.instDailyLive.daily.map(function(e){return {date:e.date,net:e.net,foreign:e.foreign,trust:e.trust,dealer:e.dealer,official:true};});
    instOfficialAll=true; foreign5=rows.instDailyLive.foreign5;
  } else {
    instDaily=demo.instDaily.map(function(e){return {date:e.date,net:e.net,foreign:e.foreign,trust:e.trust,dealer:e.dealer,official:false};});
    if(instLive&&instDaily.length){ instDaily[instDaily.length-1].net=totalNet; instDaily[instDaily.length-1].foreign=foreignNet; instDaily[instDaily.length-1].trust=trustNet; instDaily[instDaily.length-1].dealer=dealerNet; instDaily[instDaily.length-1].official=true; }
    foreign5=instDaily.slice(-5).reduce(function(a,e){return a+(e.foreign||0);},0);
  }

  var marginLive=!!marginRow;
  var marginBalance=marginLive?toNum(field(marginRow,["融資今日餘額","融資餘額"])):demo.marginBalance;
  var marginPrev=marginLive?toNum(field(marginRow,["融資前日餘額"])):null;
  var marginDelta=marginLive?((marginBalance!=null&&marginPrev!=null)?marginBalance-marginPrev:null):demo.marginDelta;
  var shortBalance=marginLive?toNum(field(marginRow,["融券今日餘額","融券餘額"])):demo.shortBalance;
  var shortPrev=marginLive?toNum(field(marginRow,["融券前日餘額"])):null;
  var shortDelta=marginLive?((shortBalance!=null&&shortPrev!=null)?shortBalance-shortPrev:null):demo.shortDelta;

  var valLive=!!valRow;
  var fundExt=rows.fundExt||null;                      // Yahoo 即時基本面（PE/PB/殖利率/EPS）
  var twPe=valLive?toNum(field(valRow,["PEratio","本益比"])):null;
  var twYield=valLive?toNum(field(valRow,["DividendYield","殖利率"])):null;
  var twPb=valLive?toNum(field(valRow,["PBratio","股價淨值比"])):null;
  // 優先用 Yahoo 即時值，其次 TWSE，再次示範
  var pe=(fundExt&&fundExt.pe!=null)?fundExt.pe:(twPe!=null?twPe:demo.pe);
  var yieldPct=(fundExt&&fundExt.yield!=null)?fundExt.yield:(twYield!=null?twYield:demo.yieldPct);
  var pb=(fundExt&&fundExt.pb!=null)?fundExt.pb:(twPb!=null?twPb:demo.pb);
  var eps=(fundExt&&fundExt.eps!=null)?fundExt.eps:null;   // EPS 目前僅 Yahoo 提供
  var fundLive=!!(fundExt&&Object.keys(fundExt).length)||valLive;

  // 融資融券近 10 日（FinMind，舊→新）；無則示範
  var marginDailyLive=(rows.marginDailyLive&&rows.marginDailyLive.length)?rows.marginDailyLive:null;
  var marginDaily=marginDailyLive
    ? marginDailyLive.map(function(e){return {date:e.date,marginBal:e.marginBal,shortBal:e.shortBal,ratio:e.ratio,official:true};})
    : demo.marginDaily.map(function(e){return {date:e.date,marginBal:e.marginBal,shortBal:e.shortBal,ratio:e.ratio,official:false};});
  var marginOfficialAll=!!marginDailyLive;

  var shortMarginRatio=(latestMD&&latestMD.ratio!=null)?latestMD.ratio:((marginBalance&&marginBalance>0&&shortBalance!=null)?(shortBalance/marginBalance*100):null);

  var techLive=!!(liveHist&&liveHist.length>=10);
  var hist=techLive?liveHist:demo.hist;
  var technical=null;
  if(hist&&hist.length>=10){
    var closes=hist.map(function(h){return h.close;}), highs=hist.map(function(h){return h.high;}), lows=hist.map(function(h){return h.low;});
    var ma5=computeMA(closes,5),ma10=computeMA(closes,10),ma20=computeMA(closes,20),ma60=computeMA(closes,60);
    technical={
      chartData:hist.map(function(h,i){return {date:shortDate(h.date),open:h.open,high:h.high,low:h.low,close:h.close,ma5:ma5[i],ma10:ma10[i],ma20:ma20[i],ma60:ma60[i]};}).slice(-120),
      latestClose:closes[closes.length-1],ma5:ma5[ma5.length-1],ma10:ma10[ma10.length-1],ma20:ma20[ma20.length-1],ma60:ma60[ma60.length-1]
    };
    technical.pattern=maPattern(technical.latestClose,technical.ma5,technical.ma10,technical.ma20);
    technical.goldenCross=(function(){var n2=closes.length,g=false;for(var gi=Math.max(1,n2-3);gi<n2;gi++){if(ma5[gi-1]!=null&&ma10[gi-1]!=null&&ma5[gi]!=null&&ma10[gi]!=null&&ma5[gi-1]<=ma10[gi-1]&&ma5[gi]>ma10[gi])g=true;}return g;})();
  }
  var priceChangeSign=change!=null?Math.sign(change):(technical&&technical.chartData.length>=2?Math.sign(technical.latestClose-technical.chartData[technical.chartData.length-2].close):null);

  // ===== 建倉綜合評分引擎 v2 =====
  var indexHist=rows.indexHist||null;
  var instTargets=(rows.instTargets&&rows.instTargets.length)?rows.instTargets:null; // 外資真實目標價（鉅亨）
  var resolvedTargets=instTargets||demo.analystTargets;
  var techPoint=technical?techPointEval(technical,instTargets,closePrice):null; // 只餵真實法人目標；無則僅用本工具目標＋乖離
  var weekPattern=(hist&&hist.length>=60)?patternOf(weeklyCloses(hist)):null;
  var weekMACD=(hist?weekMACDof(hist):null);
  var beta=(liveHist&&indexHist)?betaCalc(liveHist,indexHist):null;
  var avgVolLots=null;
  if(liveHist&&liveHist.length){
    var vs=liveHist.slice(-20).map(function(h){return h.volume;}).filter(function(x){return x!=null;});
    if(vs.length) avgVolLots=Math.round((vs.reduce(function(a,b){return a+b;},0)/vs.length)/1000);
  }
  // 相對量（今日量 ÷ 前 20 日均量），用於自適應流動性偵測主力進場
  var relVol=null;
  if(liveHist&&liveHist.length>=21){
    var allv=liveHist.map(function(h){return h.volume;}).filter(function(x){return x!=null;});
    if(allv.length>=21){ var todayV=allv[allv.length-1], avg20=allv.slice(-21,-1).reduce(function(a,b){return a+b;},0)/20; if(avg20>0) relVol=todayV/avg20; }
  }
  var balMetrics=rows.balanceMetrics||null;
  var capital=(balMetrics&&balMetrics.capital!=null)?balMetrics.capital:demo.capital;
  var debtRatio=(balMetrics&&balMetrics.debtRatio!=null)?balMetrics.debtRatio:null;
  var grossMargin=rows.grossMargin||demo.grossMargin;
  var forceCyclical=!!cyclicalOverride[code];
  // 財報時間差：自動依最新財報日期計算「距今幾個月」，可由使用者覆寫
  var repDate=(grossMargin&&grossMargin.latestDate)?grossMargin.latestDate:(demo.reportDate||null);
  var monthsSinceReport=null;
  if(recencyOverride[code]!=null){ monthsSinceReport=recencyOverride[code]; }
  else if(repDate){ var rd=new Date(repDate); if(!isNaN(rd.getTime())) monthsSinceReport=Math.max(0,Math.round((Date.now()-rd.getTime())/(1000*60*60*24*30.4))); }
  // 出場策略所需：ATR 與結構均線
  var atrVal=(technical?atr14(technical.chartData,14):null);
  var refPrice=(closePrice!=null?closePrice:(technical?technical.latestClose:null));
  // 強制景氣循環股偵測
  var cycAuto=cyclicalAutoDetect(code,industry,name);
  var ctx={
    isETF:isETF, industryClass:classifyIndustry(industry), forceCyclical:forceCyclical,
    cyclicalAuto:cycAuto.hit, cyclicalReason:cycAuto.reason,
    regime:marketRegime(indexHist),
    historyDays:(liveHist?liveHist.length:(hist?hist.length:null)),
    dayPattern:technical?technical.pattern:null, weekPattern:weekPattern, weekMACD:weekMACD,
    dayGoldenCross:(technical?!!technical.goldenCross:false),
    revYoY:isETF?null:revYoYSeries,
    peVsIndustry:isETF?null:peVsIndustry, pb:isETF?null:pb,

    beta:beta, debtRatio:debtRatio,
    atr:atrVal, price:refPrice, ma20:(technical?technical.ma20:null), ma60:(technical?technical.ma60:null),
    shortMarginRatio:shortMarginRatio, marginDelta:marginDelta, priceChangeSign:priceChangeSign,
    disposition:false,
    stopFall:(technical?stopFallSignal(technical.chartData):null),
    converge:(technical?maConverge(technical):false),
    techPoint:techPoint
  };
  var score=computeScore(ctx);

  // 本工具研判目標價（高/低）：以近60日高低為基準，依綜合評分微調
  var targetCalc=null;
  if(technical){
    var hl60=priorHighLow(technical.chartData,60);
    if(hl60.high!=null&&hl60.low!=null){
      var tone=score.grade.tone, hiT, loT;
      if(tone==="bull"){ hiT=hl60.high*1.05; loT=hl60.low; }
      else if(tone==="bear"){ hiT=hl60.high*0.98; loT=hl60.low*0.95; }
      else { hiT=hl60.high; loT=hl60.low; }
      var ref=(closePrice!=null?closePrice:technical.latestClose);
      if(ref!=null){ hiT=Math.max(hiT,ref); loT=Math.min(loT,ref); }   // 高≥現價≥低
      targetCalc={high:hiT, low:loT, ref:ref,
        upPct:(ref?(hiT-ref)/ref*100:null), downPct:(ref?(loT-ref)/ref*100:null)};
    }
  }

  return {status:"ready",updating:!!updating,code:code,name:name,industry:industry,isETF:isETF,
    closePrice:closePrice,change:change,priceLive:priceLive,priceSource:priceSource,priceTime:priceTime,priceDate:priceDate,priceIntraday:priceIntraday,
    revenue:{live:revLive||revOfficialAll,officialAll:revOfficialAll,revYoY:revYoY,revMoM:revMoM,revenueChartData:revenueChartData,yearMonth:yearMonth,yearList:yearList},

    technical:technical,techLive:techLive,score:score,targets:resolvedTargets,targetsLive:!!instTargets,targetCalc:targetCalc};
}

/* ===== SVG 圖 ===== */
function svgLine(data){
  var W=340,H=190,padT=10,padB=10,padL=4,padR=4, series=["close","ma5","ma10","ma20"];
  var colors={close:COL.coffee,ma5:COL.red,ma10:COL.gold,ma20:COL.green};
  var vals=[]; data.forEach(function(d){series.forEach(function(s){if(d[s]!=null)vals.push(d[s]);});});
  if(!vals.length) return "";
  var min=Math.min.apply(null,vals),max=Math.max.apply(null,vals); if(min===max){min-=1;max+=1;}
  var x=function(i){return padL+(i/(data.length-1))*(W-padL-padR);};
  var y=function(v){return padT+(1-(v-min)/(max-min))*(H-padT-padB);};
  var paths="";
  series.forEach(function(s){
    var dstr="",started=false;
    data.forEach(function(d,i){ if(d[s]==null)return; dstr+=(started?" L":"M")+x(i).toFixed(1)+" "+y(d[s]).toFixed(1); started=true; });
    if(dstr) paths+='<path d="'+dstr+'" fill="none" stroke="'+colors[s]+'" stroke-width="'+(s==="close"?1.8:1.1)+'" stroke-linejoin="round"/>';
  });
  return {svg:'<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="'+H+'" preserveAspectRatio="xMidYMid meet" style="display:block">'+paths+'</svg>',min:min,max:max};
}
function svgBars(items,opt){
  var W=340,H=opt.height||150,padT=18,padB=4;
  var vals=items.map(function(d){return d.value||0;});
  var max=Math.max.apply(null,vals.concat([0])), min=opt.signed?Math.min.apply(null,vals.concat([0])):0;
  if(max===min) max=min+1;
  var n=items.length,gap=16,bw=(W-gap*(n+1))/n;
  var y=function(v){return padT+(1-(v-min)/(max-min))*(H-padT-padB);};
  var base=y(0),out="";
  items.forEach(function(d,i){
    var xx=gap+i*(bw+gap), vy=y(d.value||0), top=Math.min(vy,base), h=Math.abs(vy-base);
    out+='<rect x="'+xx.toFixed(1)+'" y="'+top.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+Math.max(h,0.6).toFixed(1)+'" rx="2" fill="'+opt.colorFn(d,i)+'"/>';
    out+='<text x="'+(xx+bw/2).toFixed(1)+'" y="'+(top-4).toFixed(1)+'" font-size="9.5" text-anchor="middle" fill="'+COL.taupe+'">'+opt.fmt(d.value)+'</text>';
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="'+H+'" preserveAspectRatio="xMidYMid meet" style="display:block">'+out+'</svg>';
}
// K 棒圖：cw = 每根像素寬度（縮放等級）。回傳實際寬度供捲動容器使用。
function svgCandles(data,cw){
  var H=232,padT=10,padB=10;
  var maCols={ma5:MA_COL.ma5,ma10:MA_COL.ma10,ma20:MA_COL.ma20,ma60:MA_COL.ma60};
  var lo=Infinity,hi=-Infinity;
  data.forEach(function(d){
    if(d.low!=null)lo=Math.min(lo,d.low); if(d.high!=null)hi=Math.max(hi,d.high);
    ["ma5","ma10","ma20","ma60"].forEach(function(k){ if(d[k]!=null){lo=Math.min(lo,d[k]);hi=Math.max(hi,d[k]);} });
  });
  if(!isFinite(lo)||!isFinite(hi)) return {svg:"",width:0,lo:0,hi:0};
  if(lo===hi){lo-=1;hi+=1;}
  var W=Math.max(data.length*cw,cw);
  var y=function(v){return padT+(1-(v-lo)/(hi-lo))*(H-padT-padB);};
  // 水平股價刻度線
  var ticks=[],N=5,grid="";
  for(var ti=0;ti<N;ti++){ var tv=lo+(hi-lo)*ti/(N-1); ticks.push({v:tv,y:y(tv)}); }
  ticks.forEach(function(t){ grid+='<line x1="0" y1="'+t.y.toFixed(1)+'" x2="'+W.toFixed(0)+'" y2="'+t.y.toFixed(1)+'" stroke="#D8CAAC" stroke-width="0.5" opacity="0.7"/>'; });
  var bodyW=Math.max(cw*0.62,1.4);
  var candles="";
  data.forEach(function(d,i){
    var cx=i*cw+cw/2, up=(d.close>=d.open), col=up?COL.red:COL.green;
    if(d.high!=null&&d.low!=null) candles+='<line x1="'+cx.toFixed(1)+'" y1="'+y(d.high).toFixed(1)+'" x2="'+cx.toFixed(1)+'" y2="'+y(d.low).toFixed(1)+'" stroke="'+col+'" stroke-width="'+(cw>=8?1.2:0.8)+'"/>';
    if(d.open!=null&&d.close!=null){
      var yo=y(d.open),yc=y(d.close),top=Math.min(yo,yc),h=Math.abs(yo-yc); if(h<1)h=1;
      candles+='<rect x="'+(cx-bodyW/2).toFixed(1)+'" y="'+top.toFixed(1)+'" width="'+bodyW.toFixed(1)+'" height="'+h.toFixed(1)+'" fill="'+col+'"/>';
    }
  });
  var lines="";
  ["ma5","ma10","ma20","ma60"].forEach(function(s){
    var dstr="",started=false;
    data.forEach(function(d,i){ if(d[s]==null)return; var cx=i*cw+cw/2; dstr+=(started?" L":"M")+cx.toFixed(1)+" "+y(d[s]).toFixed(1); started=true; });
    if(dstr) lines+='<path d="'+dstr+'" fill="none" stroke="'+maCols[s]+'" stroke-width="1.1" stroke-linejoin="round" opacity="0.95"/>';
  });
  var svg='<svg width="'+W.toFixed(0)+'" height="'+H+'" viewBox="0 0 '+W.toFixed(0)+' '+H+'" style="display:block">'+grid+candles+lines+'</svg>';
  return {svg:svg,width:W,lo:lo,hi:hi,H:H,ticks:ticks};
}
// 左側固定股價刻度軸
function svgYAxis(H,ticks,hi){
  var W=46,dec=hi>=1000?0:2,out="";
  ticks.forEach(function(t){
    out+='<line x1="'+(W-4)+'" y1="'+t.y.toFixed(1)+'" x2="'+W+'" y2="'+t.y.toFixed(1)+'" stroke="#C9B894" stroke-width="0.8"/>';
    var yy=Math.min(Math.max(t.y,9),H-3);
    out+='<text x="'+(W-6)+'" y="'+(yy+3).toFixed(1)+'" font-size="9.5" text-anchor="end" fill="#8A7458">'+t.v.toLocaleString("zh-TW",{minimumFractionDigits:dec,maximumFractionDigits:dec})+'</text>';
  });
  return '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="display:block">'+out+'</svg>';
}

function pfFmtSigned(n,dec){ if(n==null||isNaN(n)) return "—"; return (n>=0?"+":"")+fmtNum(n,dec==null?0:dec); }
function pfColor(n){ return n==null?COL.taupe:(n>=0?COL.red:COL.green); }   // 紅漲綠跌
function pfTotals(){
  var totPL=0,totCost=0,dayPL=0,dayBase=0,any=false;
  portfolio.forEach(function(h){
    var q=pfQuotes[h.code]; if(!q||q.price==null) return;
    any=true;
    totPL+=(q.price-h.cost)*h.shares; totCost+=h.cost*h.shares;
    if(q.prevClose!=null){ dayPL+=(q.price-q.prevClose)*h.shares; dayBase+=q.prevClose*h.shares; }
  });
  return {any:any,totPL:totPL,totPct:totCost>0?totPL/totCost*100:null,dayPL:dayPL,dayBase:dayBase,dayPct:dayBase>0?dayPL/dayBase*100:null};
}
function renderPfHead(){
  var th=document.getElementById("pfTotalHead"), dh=document.getElementById("pfDayHead");
  if(!th||!dh) return;
  if(!portfolio.length){ th.textContent="—"; dh.textContent="—"; th.style.color=dh.style.color=COL.taupe; return; }
  var T=pfTotals();
  if(!T.any){ th.textContent=dh.textContent=(pfLoading?"讀取中…":"—"); th.style.color=dh.style.color=COL.taupe; return; }
  th.textContent=pfFmtSigned(T.totPL,0)+(T.totPct!=null?"（"+pfFmtSigned(T.totPct,2)+"%）":"");
  th.style.color=pfColor(T.totPL);
  dh.textContent=(T.dayBase>0?pfFmtSigned(T.dayPL,0)+(T.dayPct!=null?"（"+pfFmtSigned(T.dayPct,2)+"%）":""):"—");
  dh.style.color=pfColor(T.dayBase>0?T.dayPL:null);

function fetchPortfolioQuotes(silent){
  if(!portfolio.length){ renderPfHead(); if(!silent&&portfolioOpen) renderPfBody(); return; }
  if(pfFetching) return;            // 避免多輪重疊
  pfFetching=true;
  if(!silent){ pfLoading=true; if(portfolioOpen) renderPfBody(); } else { renderPfHead(); }
  function finish(){ pfFetching=false; pfLoading=false; renderPfHead(); if(portfolioOpen) renderPfBody(); }
  function fallbackPerStock(){   // 批次不可用時逐檔抓（相容舊 proxy／離線）
    Promise.all(portfolio.map(function(h){
      return fetchYahoo(h.code).then(function(y){ if(y&&y.rt&&y.rt.close!=null) pfQuotes[h.code]={price:y.rt.close,prevClose:y.rt.prevClose}; }).catch(function(){});
    })).then(finish);
  }
  var codes=portfolio.map(function(h){return h.code;}).join(",");
  var ctrl=new AbortController(), t=setTimeout(function(){ctrl.abort();},9000);
  fetch(PROXY_BASE+"/quotes?codes="+encodeURIComponent(codes),{signal:ctrl.signal})
    .then(function(r){ clearTimeout(t); if(!r.ok) throw 0; return r.json(); })
    .then(function(j){
      var got=0;
      if(j&&j.quotes){ for(var k in j.quotes){ var qq=j.quotes[k]; if(qq&&qq.price!=null){ pfQuotes[k]={price:qq.price,prevClose:qq.prevClose}; got++; } } }
      if(got>0) finish(); else fallbackPerStock();   // 批次全空 → 退回逐檔
    })
    .catch(function(){ clearTimeout(t); fallbackPerStock(); });
}

function addHolding(){
  var ce=document.getElementById("pfCode"), se=document.getElementById("pfShares"), pe=document.getElementById("pfCost");
  if(!ce||!se||!pe) return;
  var raw=ce.value.trim(); if(!raw){ ce.focus(); return; }
  var code=resolveQuery(raw)||raw.toUpperCase();
  var shares=parseFloat(se.value), cost=parseFloat(pe.value);
  if(!/^[0-9A-Z]{4,6}$/.test(code)){ ce.focus(); return; }
  if(isNaN(shares)||shares<=0){ se.focus(); return; }
  if(isNaN(cost)||cost<=0){ pe.focus(); return; }
  portfolio=portfolio.filter(function(h){return h.code!==code;});  // 同股覆蓋
  portfolio.push({code:code,name:NAME_MAP[code]||raw,shares:shares,cost:cost});
  savePortfolio();
  pfPage=Math.floor((portfolio.length-1)/settings.pfPageSize);   // 跳到新加入持股所在頁
  ce.value=""; se.value=""; pe.value="";
  // 抓該股報價
  fetchYahoo(code).then(function(y){
    if(y&&y.rt&&y.rt.close!=null) pfQuotes[code]={price:y.rt.close,prevClose:y.rt.prevClose};
    renderPortfolio();
  }).catch(function(){ renderPortfolio(); });
  renderPortfolio();
}

// 自動定時更新：靜默重抓 Yahoo 即時價＋成交量，套回評分模型（無按鈕、不打擾）
function autoRefresh(){
  if(syncing||!current||current.status!=="ready") return;
  if(typeof document!=="undefined"&&document.hidden) return; // 分頁不在前景時略過，省資源
  var code=current.code, name=current.name;
  syncing=true;
  Promise.all([
    fetchRealtime(code).catch(function(){return null;}),   // 證交所官方即時（最準）
    fetchYahoo(code).catch(function(){return null;})        // Yahoo（補 K 線歷史；價格備援）
  ]).then(function(r){
    syncing=false;
    var mis=r[0], y=r[1];
    var rt=pickRealtime(mis, y&&y.rt);
    if(rt&&rt.close!=null){
      var demo=makeDemo(code,name);
      var prev=lastRowsByCode[code]||{};
      var hist=(y&&y.hist)?y.hist:prev.hist;
      var rows=Object.assign({},prev,{realtime:rt,hist:hist});
      lastSync={code:code,time:new Date()};
      if(current&&current.code===code) renderMain(buildView(code,name,rows,demo,false));
    }
  }).catch(function(){ syncing=false; });
}

    // ===== 區間整理：均線箱型理論（近 10 日）＋ 籌碼換手 =====
    var cd=st.technical.chartData, cdN=cd.length, last10=cd.slice(-10);

    else { boxLabel="橫盤整理"; boxCol=COL.gold; boxDesc="均線走平、股價於區間中段（"+(pos!=null?(pos*100).toFixed(0)+"%":"—")+"）橫向狹幅盤整，多空方向待表態。"; }

    // ===== 整理結果：換手成功／失敗（紅K突破·量放大·週轉熱·籌碼集中·不回頭；含假突破與量大不漲陷阱）=====
    var hoLabel,hoCol,hoDesc;

      // 失敗陷阱

      }

    // 支撐／壓力點位（以最接近現價的均線為準）

  // 財報時間差：使用者可輸入覆寫
  bVer+='<div style="margin-top:10px;font-size:12px;color:var(--coffeeMid);display:flex;align-items:center;gap:8px;flex-wrap:wrap">'+

      '<span style="font-size:11px;color:'+COL.faint+'">點此手動切換為循環股反轉評分</span></div>';
  }
  // 四大維度小計
  function dimOf(g){ return g==="cyclical"?"cyc":g==="techpoint"?"tpt":g==="tech"?"tech":g==="chips"?"chip":"fund"; } // funda 與 risk → 基本面
  var DIMS=[{k:"fund",l:"基本面"},{k:"tech",l:"技術面"},{k:"chip",l:"籌碼面"},{k:"tpt",l:"技術點位"},{k:"cyc",l:"循環股修正"}];
  var dimAgg={};
  sc.factors.forEach(function(f){ if(f.score==null)return; var d=dimOf(f.group); if(!dimAgg[d])dimAgg[d]={n:0,w:0}; dimAgg[d].n+=f.score*f.weight; dimAgg[d].w+=f.weight; });

  }).join("")+'</div>';

  bVer+='<div class="ryhd" style="margin-top:18px">動態權重（隨市場狀態／財報時效調整）</div>';
  bVer+='<div class="meter">'+sc.factors.map(function(f){

  }).join("")+'</div>';
  bVer+='<div style="margin-top:12px">'+sc.factors.map(function(f){
    var c=f.score==null?COL.faint:f.score>0.15?COL.red:f.score<-0.15?COL.green:COL.gold;

  }).join("")+'</div>';

  /* ───── 底端：需要注意 ───── */
  bVer+='<div class="ryhd" style="margin-top:20px;color:'+COL.red+'">需要注意</div>';
  bVer+='<div class="blind">'+sc.blindspots.map(function(b){return '<div class="bl"><span class="blx">!</span><span>'+b+'</span></div>';}).join("")+'</div>';
  bVer+='<div class="disc" style="margin-top:16px"><p>五大維度＝基本面、技術面、籌碼面、循環股修正、技術點位；技術點位＝超漲跌·區間整理·均線買點；動態權重會依大盤多空／波動與財報時效自動調整，觸發保護機制者一律列危險。防守價由 ATR 波動率與結構均線推算，僅供風控參考。本工具整理公開資料，不構成投資建議，進出場請自行判斷並承擔風險。</p></div>';
  html+=accItem("verdict","建倉綜合評分",true,bVer);

  dom.main.innerHTML=html;
  renderChips();
  var kb=document.getElementById("kbar");
  if(kb){ kb.scrollLeft=kb.scrollWidth; }
}

/* ===== 載入流程 ===== */
function loadStock(rawCode,fallbackName){
  var code=String(rawCode).trim().toUpperCase();
  if(!/^[0-9A-Z]{4,6}$/.test(code)){ renderMain({status:"notfound",code:code}); return; }
  var my=++reqId;
  var demo=makeDemo(code,fallbackName);
  try{ localStorage.setItem("twse_last",code); }catch(e){}
  pushRecent(code, fallbackName);
  syncing=false; lastSync=null;

  /* 立即示範資料 */
  renderMain(buildView(code,fallbackName,{},demo,true));

  /* 背景即時資料：Yahoo 取最新價與每日 OHLC（畫 K 棒）；證交所 OpenAPI 取財報籌碼 */
  Promise.all([
    ensureAll("valuation",EP.valuation),
    ensureAll("margin",EP.margin),
    ensureAll("institutional",EP.institutional),
    ensureAll("companyInfo",EP.companyInfo),
    ensureAll("revenue",EP.revenue),
    fetchRealtime(code).catch(function(){return null;}),
    fetchYahoo(code).catch(function(){return null;}),
    fetchMonthlyRevenue(code).catch(function(){return null;}),
    fetchInstDaily(code).catch(function(){return null;}),
    fetchIndexHist().catch(function(){return null;}),
    fetchBalanceMetrics(code).catch(function(){return null;}),
    fetchMarginDaily(code).catch(function(){return null;}),
    fetchGrossMargin(code).catch(function(){return null;}),
    fetchInstTargets(code).catch(function(){return null;}),
    fetchFundamentals(code).catch(function(){return null;}),
    fetchShareholding(code).catch(function(){return null;})
  ]).then(function(res){
    var yahoo=res[6];
    var histKey="hist_"+code, histP;
    if(yahoo&&yahoo.hist&&yahoo.hist.length){ histP=Promise.resolve(yahoo.hist); }
    else if(cache[histKey]!==undefined){ histP=Promise.resolve(cache[histKey]); }
    else { histP=Promise.all([fetchMonth(code,monthsBack(2)),fetchMonth(code,monthsBack(1)),fetchMonth(code,monthsBack(0))])
        .then(function(parts){var h=parts[0].concat(parts[1],parts[2]); cache[histKey]=h.length?h:null; return cache[histKey];})
        .catch(function(){cache[histKey]=null; return null;}); }
    return histP.then(function(hist){ return {res:res,hist:hist,yahoo:yahoo}; });
  }).then(function(bundle){
    if(my!==reqId) return;
    var res=bundle.res, yahoo=bundle.yahoo;
    var valuation=res[0], companyInfo=res[3];
    augmentNamesFrom(companyInfo,valuation);
    var infoRow=findByCode(companyInfo,code,["公司代號","Code"]);
    var industry=industryName(field(infoRow,["產業別"]));
    var indAvg=industry?industryAverage(companyInfo,valuation,industry):null;
    var rows={
      priceRow:null,
      valRow:findByCode(valuation,code,["Code","證券代號"]),
      marginRow:findByCode(res[1],code,["股票代號","Code","證券代號"]),
      instRow:findByCode(res[2],code,["Code","證券代號","股票代號"]),
      infoRow:infoRow,
      revRow:findByCode(res[4],code,["公司代號","Code"]),
      indAvg:indAvg, hist:bundle.hist,
      realtime:pickRealtime(res[5], yahoo&&yahoo.rt),
      monthlyRevenue:res[7], instDailyLive:res[8], indexHist:res[9], balanceMetrics:res[10], marginDailyLive:res[11], grossMargin:res[12], instTargets:res[13], fundExt:res[14], shareholding:res[15]
    };
    lastRowsByCode[code]=rows;
    renderMain(buildView(code,fallbackName,rows,demo,false));
  }).catch(function(){
    if(my!==reqId) return;
    renderMain(buildView(code,fallbackName,{},demo,false));
  });
}
