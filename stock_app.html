// 偵測本機代理（proxy.py）是否運作，給使用者即時報價就緒狀態
function checkProxy(){
  var el=document.getElementById("proxystat"); if(!el) return;
  var ctrl=new AbortController(), t=setTimeout(function(){ctrl.abort();},1500);
  fetch(PROXY_BASE+"/ping",{signal:ctrl.signal}).then(function(r){return r.json();}).then(function(j){
    clearTimeout(t);
    if(j&&j.ok){
      LOCAL_ALIVE=true;
      if(PROXIES[0]!==LOCAL_PROXY) PROXIES.unshift(LOCAL_PROXY); // 確認存活才把本機代理排到最前
      el.style.display="block"; el.style.color="#4F6B47"; el.innerHTML="● 網路已連線，股價資訊已即時更新";
    } else throw 0;
  }).catch(function(){ clearTimeout(t);
    el.style.display="block"; el.style.color="#9C6B2E";
    el.innerHTML="○ 未偵測到代理，即時價走公開代理。電腦本機：proxy.py 與本檔放同資料夾，執行 <b>python3 proxy.py</b> 後改開 <b>http://localhost:8787</b>";
  });
}
function init(){
  dom.main=document.getElementById("main");
  dom.watchBtn=document.getElementById("watchBtn");
  dom.watchpanel=document.getElementById("watchpanel");
  dom.portfolioBtn=document.getElementById("portfolioBtn");
  dom.portfoliopanel=document.getElementById("portfoliopanel");
  dom.upd=document.getElementById("upd");
  dom.q=document.getElementById("q");
  dom.ac=document.getElementById("aclist");
  dom.idxband=document.getElementById("idxband");

  document.getElementById("searchForm").addEventListener("submit",function(e){
    e.preventDefault(); var v=dom.q.value.trim(); if(!v) return;
    var code=resolveQuery(v);
    if(!code){ renderMain({status:"notfound",code:v}); hideAC(); dom.q.blur(); return; }
    loadStock(code, NAME_MAP[code]||null); dom.q.value=""; hideAC(); dom.q.blur();
  });
  dom.q.addEventListener("input",function(){ var v=dom.q.value; if(v.trim()) renderAC(v); else renderRecent(); });
  dom.q.addEventListener("focus",function(){ if(dom.q.value.trim()) renderAC(dom.q.value); else renderRecent(); });
  dom.q.addEventListener("blur",function(){ setTimeout(hideAC,150); });
  document.addEventListener("keydown",function(e){
    if(e.key!=="Enter") return;
    var id=e.target&&e.target.id;
    if(id==="pfCode"||id==="pfShares"||id==="pfCost"){ e.preventDefault(); addHolding(); }
  });
  document.addEventListener("input",function(e){
    if(e.target&&e.target.id==="pfCode"){ var v=e.target.value; if(v.trim()) renderPfAC(v); else hidePfAC(); }
  });
  document.addEventListener("focusout",function(e){
    if(e.target&&e.target.id==="pfCode"){ setTimeout(hidePfAC,160); }
  });

  // 財報時間差使用者覆寫
  document.addEventListener("change",function(e){
    var t=e.target;
    if(t&&t.id==="recencyInput"){
      if(current.status!=="ready") return;
      var v=parseInt(t.value,10);
      if(isNaN(v)||v<0) delete recencyOverride[current.code];
      else recencyOverride[current.code]=v;
      var rws=lastRowsByCode[current.code]||{};
      renderMain(buildView(current.code,current.name,rws,makeDemo(current.code,current.name),false));
    }
  });

  document.addEventListener("click",function(e){
    var t=e.target.closest("[data-act]"); if(!t) return;
    var act=t.getAttribute("data-act");
    if(act==="pick"){ var pc=t.getAttribute("data-code"); loadStock(pc,t.getAttribute("data-name")); dom.q.value=""; hideAC(); dom.q.blur(); }
    else if(act==="togglewatchpanel"){ watchPanelOpen=!watchPanelOpen; if(watchPanelOpen){ portfolioOpen=false; renderPortfolio(); } else { editing=false; } renderChips(); }
    else if(act==="toggleportfolio"){ portfolioOpen=!portfolioOpen; if(portfolioOpen){ watchPanelOpen=false; editing=false; renderChips(); } renderPortfolio(); if(portfolioOpen) fetchPortfolioQuotes(); }
    else if(act==="addholding"){ addHolding(); }
    else if(act==="delholding"){ var dc=t.getAttribute("data-code"); portfolio=portfolio.filter(function(h){return h.code!==dc;}); savePortfolio(); renderPortfolio(); }
    else if(act==="pfpick"){ var ppc=t.getAttribute("data-code"); var ci=document.getElementById("pfCode"); if(ci) ci.value=ppc; hidePfAC(); var se=document.getElementById("pfShares"); if(se) se.focus(); }
    else if(act==="pfprev"){ if(pfPage>0){ pfPage--; renderPfBody(); } }
    else if(act==="pfnext"){ pfPage++; renderPfBody(); }
    else if(act==="exportdata"){ exportData(); }
    else if(act==="importdata"){ importData(); }
    else if(act==="toggleedit"){ editing=!editing; if(editing) watchPanelOpen=true; renderChips(); }
    else if(act==="load"){ loadStock(t.getAttribute("data-code"),t.getAttribute("data-name")); }
    else if(act==="remove"){ var c=t.getAttribute("data-code"); watch=watch.filter(function(w){return w.code!==c;}); saveWatch(); renderChips(); }
    else if(act==="togglewatch"){
      if(current.status!=="ready") return;
      if(watch.some(function(w){return w.code===current.code;})) watch=watch.filter(function(w){return w.code!==current.code;});
      else watch.push({code:current.code,name:current.name});
      saveWatch(); renderMain(current);
    }
    else if(act==="zoomin"){ if(candleZoom<CW_STEPS.length-1){candleZoom++; renderMain(current);} }
    else if(act==="zoomout"){ if(candleZoom>0){candleZoom--; renderMain(current);} }
    else if(act==="refreshidx"){ loadIndices(); }
    else if(act==="acc"){
      var key=t.getAttribute("data-key"); openSec[key]=!openSec[key]; renderMain(current);
    }
    else if(act==="accall"){
      var v=t.getAttribute("data-v")==="1"; ACC_KEYS.forEach(function(k){openSec[k]=v;}); renderMain(current);
    }
    else if(act==="onlyverdict"){
      ACC_KEYS.forEach(function(k){openSec[k]=false;}); openSec.verdict=true; renderMain(current);
    }
    else if(act==="togglecyclical"){
      if(current.status!=="ready") return;
      cyclicalOverride[current.code]=!cyclicalOverride[current.code];
      var rws=lastRowsByCode[current.code]||{};
      renderMain(buildView(current.code,current.name,rws,makeDemo(current.code,current.name),false));
    }
  });

  renderChips();
  renderPortfolio();
  fetchPortfolioQuotes(true);                          // 載入即抓全部庫存報價→標頭損益就緒
  setInterval(function(){ if(portfolio.length && !document.hidden) fetchPortfolioQuotes(true); }, 5000); // 每 5 秒自動更新庫存損益
  renderIndices();
  loadIndices();
  checkProxy();
  setInterval(autoRefresh, settings.refreshSec*1000); // 每數秒自動更新目前個股的即時股價與評分
  beatOnce(); setInterval(beatOnce, 15000);  // 線上人數心跳（每 15 秒）
  // 預先載入清單以充實中文搜尋（背景）：上市、上櫃、全市場
  Promise.all([ensureAll("companyInfo",EP.companyInfo),ensureAll("valuation",EP.valuation)])
    .then(function(r){ augmentNamesFrom(r[0],r[1]); }).catch(function(){});
  ensureAll("otcInfo",EP.otcInfo).then(function(a){ augmentNamesFrom(a,null); }).catch(function(){});
  fetchAllStockInfo().then(function(a){ if(a) addNames(a); }).catch(function(){});
  var last; try{ last=localStorage.getItem("twse_last"); }catch(e){}
  var start=last||"2330";
  loadStock(start, NAME_MAP[start]||null);
}
if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",init); else init();
})();
</script>
</body>
</html>
